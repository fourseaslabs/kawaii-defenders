<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kawaii Defenders Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FFF8EC; --peach:#FFB8A0; --mint:#A8E6CF; --lavender:#C7B8EA;
  --rose:#FF8FB8; --sky:#A0D8F0; --sun:#FFD66B; --ink:#3D2E3F;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; overscroll-behavior:none; }
body {
  font-family:'Nunito',sans-serif;
  background:
    radial-gradient(circle at 20% 10%, #FFE0EC 0%, transparent 45%),
    radial-gradient(circle at 80% 85%, #D4F0FF 0%, transparent 45%),
    radial-gradient(circle at 60% 40%, #FFF4D4 0%, transparent 50%),
    #FFF8EC;
  color:var(--ink);
  min-height:100vh;
  overflow:hidden;
  position:relative;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence baseFrequency='0.9'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.06'/></svg>");
  pointer-events:none; z-index:1;
}
#app { position:relative; width:100vw; height:100vh; height:100dvh; overflow:hidden; z-index:2; }

/* HUD */
.hud { position:absolute; top:0; left:0; right:0; padding:10px 12px;
  display:flex; justify-content:space-between; align-items:center; gap:6px; z-index:10; }
.hud-pill { background:white; border:3px solid var(--ink); border-radius:999px; padding:5px 12px;
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px;
  box-shadow:0 3px 0 var(--ink); display:flex; align-items:center; gap:4px; white-space:nowrap; }
.hud-pill.lives{color:#D14D6A;} .hud-pill.coins{color:#D19700;} .hud-pill.wave{color:#6B4FA0;}
.hud-pill.level{color:#2B9B63;}

#gameCanvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }

/* Send wave */
.send-wave-btn { position:absolute; bottom:86px; left:50%; transform:translateX(-50%);
  background:var(--rose); color:white; border:4px solid var(--ink); border-radius:18px;
  padding:10px 28px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:18px;
  letter-spacing:1.2px; box-shadow:0 5px 0 var(--ink); cursor:pointer; z-index:11;
  text-shadow:2px 2px 0 rgba(0,0,0,0.15); animation:pulseBtn 1.8s ease-in-out infinite; }
.send-wave-btn:active { transform:translateX(-50%) translateY(3px); box-shadow:0 2px 0 var(--ink); }
.send-wave-btn.hidden { display:none; }
@keyframes pulseBtn { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.05);} }

/* Back button */
.back-btn { background:white; border:3px solid var(--ink); border-radius:999px;
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 var(--ink); font-size:16px; cursor:pointer; padding:0;
  font-family:'Fredoka',sans-serif; font-weight:700; flex-shrink:0; }
.back-btn:active { transform:translateY(2px); box-shadow:0 1px 0 var(--ink); }
.back-btn.floating { position:absolute; z-index:12; }

/* Tower bar */
.tower-bar { position:absolute; bottom:10px; left:8px; right:8px;
  background:white; border:3px solid var(--ink); border-radius:18px; padding:6px;
  box-shadow:0 4px 0 var(--ink); display:flex; gap:4px; z-index:10;
  justify-content:space-around; align-items:center; }
.tower-chip { flex:1; background:var(--cream); border:2px solid var(--ink); border-radius:11px;
  padding:4px 1px 3px; text-align:center; cursor:pointer; font-family:'Fredoka',sans-serif;
  transition:transform 0.15s, background 0.15s, box-shadow 0.15s; position:relative; min-width:0; }
.tower-chip:active { transform:scale(0.94); }
.tower-chip.selected { background:var(--sun); transform:translateY(-3px); box-shadow:0 3px 0 var(--ink); }
.tower-chip.disabled { opacity:0.45; }
.tower-chip .emoji { font-size:18px; display:block; line-height:1; }
.tower-chip .cost { font-size:9px; color:#A87400; font-weight:700; margin-top:1px; }

/* Tower upgrade popup */
.tower-popup { position:absolute; inset:0; background:rgba(61,46,63,0.4);
  backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
  z-index:55; display:flex; align-items:center; justify-content:center; padding:16px;
  animation:fadeIn 0.2s ease; }
.tower-card { background:white; border:4px solid var(--ink); border-radius:22px;
  padding:18px 18px 14px; box-shadow:0 7px 0 var(--ink); max-width:300px; width:100%;
  animation:popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
.tower-emoji { text-align:center; font-size:54px; line-height:1; margin-bottom:2px; animation:wiggle 0.6s ease; }
.tower-name { text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:20px; }
.tower-lvl { text-align:center; font-family:'Fredoka',sans-serif; font-size:12px;
  color:#6B4FA0; letter-spacing:1.5px; text-transform:uppercase; margin:2px 0 10px; }
.tower-stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:10px 0 14px; }
.tower-stat { background:var(--cream); border:2px solid var(--ink); border-radius:10px;
  padding:6px; text-align:center; font-family:'Fredoka',sans-serif; font-size:13px; }
.tower-stat b { color:#6B4FA0; }
.tower-btns { display:flex; gap:8px; flex-direction:column; }
.tower-btn { border:3px solid var(--ink); border-radius:14px; padding:10px 14px;
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:16px; cursor:pointer;
  box-shadow:0 4px 0 var(--ink); transition:transform 0.1s, box-shadow 0.1s;
  display:flex; justify-content:space-between; align-items:center; }
.tower-btn:active { transform:translateY(3px); box-shadow:0 1px 0 var(--ink); }
.tower-btn.upgrade { background:var(--mint); }
.tower-btn.sell { background:#FFD6D6; }
.tower-btn.close { background:white; font-size:14px; padding:8px; }
.tower-btn.disabled { opacity:0.4; pointer-events:none; }

/* Quiz overlay */
.quiz-overlay { position:absolute; inset:0;
  background:
    radial-gradient(circle at 30% 20%, #FFE0EC 0%, transparent 55%),
    radial-gradient(circle at 70% 80%, #D4F0FF 0%, transparent 55%),
    #FFF8EC;
  z-index:60; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px 16px; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.quiz-banner { font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px;
  color:var(--ink); text-shadow:3px 3px 0 var(--sun); margin-bottom:4px; text-align:center;
  animation:dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes dropIn { from{transform:translateY(-30px); opacity:0;} to{transform:translateY(0); opacity:1;} }
.quiz-progress { font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px;
  color:#7A6A7C; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
.quiz-dots { display:flex; gap:6px; margin-bottom:16px; }
.quiz-dot { width:12px; height:12px; border-radius:999px; background:#EEE; border:2px solid var(--ink);
  transition:transform 0.2s, background 0.2s; }
.quiz-dot.done{background:var(--mint);} .quiz-dot.current{background:var(--sun); transform:scale(1.25);} .quiz-dot.wrong{background:var(--peach);}

.question-card { background:white; border:4px solid var(--ink); border-radius:26px;
  padding:18px 16px; box-shadow:0 7px 0 var(--ink); max-width:340px; width:100%;
  animation:popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes popIn { from{transform:scale(0.5); opacity:0;} to{transform:scale(1); opacity:1;} }
.q-tower { font-size:44px; text-align:center; line-height:1; animation:wiggle 0.7s ease; }
@keyframes wiggle { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-10deg);} 75%{transform:rotate(10deg);} }
.q-subject { text-align:center; font-family:'Fredoka',sans-serif; font-weight:600;
  color:#888; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
.q-source { text-align:center; font-family:'Fredoka',sans-serif; font-weight:500;
  color:#6B4FA0; font-size:11px; margin-top:4px;
  background:#F3EEFA; border-radius:10px; padding:3px 10px;
  display:inline-block; position:relative; left:50%; transform:translateX(-50%);
  border:1.5px solid #C7B8EA; }
.q-review { text-align:center; font-family:'Fredoka',sans-serif; font-weight:700;
  color:white; font-size:11px; letter-spacing:1px;
  background:var(--rose); border:2px solid #C14777; border-radius:999px;
  padding:4px 12px; margin:-6px auto 8px; display:inline-block;
  position:relative; left:50%; transform:translateX(-50%);
  box-shadow:0 2px 0 #C14777;
  animation:reviewPulse 1.8s ease-in-out infinite; }
@keyframes reviewPulse {
  0%,100% { transform:translateX(-50%) scale(1); }
  50% { transform:translateX(-50%) scale(1.06); }
}
.hint-btn {
  display:block; margin:6px auto 8px; padding:6px 16px;
  background:#FFF8E1; border:2.5px solid #F9A825; border-radius:999px;
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:13px;
  color:#E65100; cursor:pointer; box-shadow:0 3px 0 #F9A825;
  transition:transform 0.15s; }
.hint-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #F9A825; }
.hint-reveal {
  margin:0 auto 10px; padding:8px 12px;
  background:#FFF8E1; border:2px solid #FFD54F; border-radius:12px;
  font-family:'Fredoka',sans-serif; font-weight:500; font-size:13px;
  color:#5D4037; text-align:center; line-height:1.4;
  animation:revealPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
.q-text { font-family:'Fredoka',sans-serif; font-weight:600; font-size:24px;
  text-align:center; margin:10px 0 14px; line-height:1.3; }
.q-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.q-option { background:var(--cream); border:3px solid var(--ink); border-radius:14px;
  padding:12px 6px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:19px;
  cursor:pointer; transition:transform 0.1s, box-shadow 0.1s, background 0.2s;
  box-shadow:0 4px 0 var(--ink); color:var(--ink); min-height:52px; }
.q-option:active { transform:translateY(3px); box-shadow:0 1px 0 var(--ink); }
.q-option.correct { background:var(--mint); animation:sparkle 0.5s; }
.q-option.wrong { background:#FFB8A0; animation:shake 0.4s; }
@keyframes sparkle { 0%{transform:scale(1);} 40%{transform:scale(1.18);} 100%{transform:scale(1);} }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

.correct-reveal {
  margin-top:12px; padding:8px 14px;
  background:#E8F5E9; border:2.5px solid #2B9B63; border-radius:12px;
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px;
  color:#1B5E20; text-align:center;
  animation:revealPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.correct-reveal b { color:#2B9B63; font-size:18px; }
.correct-reveal .exp-text {
  display:block; margin-top:6px;
  font-size:13px; font-weight:500; color:#2E7D32; line-height:1.4;
}
@keyframes revealPop { from{transform:scale(0.5); opacity:0;} to{transform:scale(1); opacity:1;} }

/* Study cards */
.study-overlay { position:absolute; inset:0;
  background:
    radial-gradient(circle at 30% 20%, #E8F5E9 0%, transparent 55%),
    radial-gradient(circle at 70% 80%, #FFF8E1 0%, transparent 55%),
    #FFF8EC;
  z-index:60; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px 16px; animation:fadeIn 0.3s ease; }
.study-banner { font-family:'Fredoka',sans-serif; font-weight:700; font-size:24px;
  color:var(--ink); text-shadow:3px 3px 0 #A8E6CF; margin-bottom:4px; text-align:center; }
.study-sub { font-family:'Fredoka',sans-serif; font-weight:600; font-size:12px;
  color:#7A6A7C; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:14px; }
.study-card { background:white; border:4px solid var(--ink); border-radius:26px;
  padding:18px 16px; box-shadow:0 7px 0 var(--ink); max-width:340px; width:100%;
  animation:popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); margin-bottom:14px; }
.study-card .study-icon { text-align:center; font-size:44px; line-height:1; margin-bottom:4px; }
.study-card .study-q { font-family:'Fredoka',sans-serif; font-weight:600; font-size:20px;
  text-align:center; margin-bottom:8px; color:var(--ink); }
.study-card .study-answer { font-family:'Fredoka',sans-serif; font-weight:700; font-size:26px;
  text-align:center; color:#2B9B63; margin-bottom:6px; }
.study-card .study-exp { font-family:'Fredoka',sans-serif; font-weight:500; font-size:14px;
  text-align:center; color:#4A3D4C; line-height:1.5; padding:8px 4px;
  background:#F1F8E9; border-radius:12px; border:2px solid #C8E6C9; }
.study-card .study-source { text-align:center; font-family:'Fredoka',sans-serif; font-weight:500;
  color:#6B4FA0; font-size:10px; margin-top:6px; }
.study-progress { display:flex; gap:6px; margin-bottom:12px; }
.study-pip { width:10px; height:10px; border-radius:50%; background:#ddd; border:2px solid var(--ink); }
.study-pip.active { background:var(--sun); transform:scale(1.2); }
.study-pip.done { background:var(--mint); }

.summary-big { font-size:64px; margin-bottom:4px; animation:bounce 1.4s ease-in-out infinite; display:inline-block; }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.summary-title { font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; margin-bottom:8px;
  text-shadow:3px 3px 0 var(--sun); text-align:center; }
.summary-stats { font-family:'Fredoka',sans-serif; font-size:16px; color:#4A3D4C;
  text-align:center; line-height:1.6; margin-bottom:6px; }
.reward-line { font-family:'Fredoka',sans-serif; font-weight:700; font-size:20px; color:#D19700; margin:4px 0; }
.bonus-line { font-family:'Fredoka',sans-serif; font-weight:700; font-size:18px; color:#2B9B63;
  margin:4px 0 16px; animation:bonusPulse 0.8s ease infinite; }
@keyframes bonusPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

/* Screens */
.screen { position:absolute; inset:0;
  background:
    radial-gradient(circle at 20% 10%, #FFE0EC 0%, transparent 45%),
    radial-gradient(circle at 80% 85%, #D4F0FF 0%, transparent 45%),
    #FFF8EC;
  z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:18px 16px; overflow-y:auto; }
.screen.hidden { display:none; }
.title { font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; color:var(--ink);
  text-align:center; line-height:0.95; letter-spacing:-1px; text-shadow:4px 4px 0 var(--sun); margin-bottom:4px; }
.subtitle { font-family:'Fredoka',sans-serif; font-weight:500; font-size:13px; color:#7A6A7C;
  margin-bottom:14px; text-align:center; }
.mascots { display:flex; gap:6px; margin-bottom:10px; font-size:30px; flex-wrap:wrap; justify-content:center; }
.mascots span { display:inline-block; animation:bounce 2s ease-in-out infinite; }
.mascots span:nth-child(2){animation-delay:0.15s;}
.mascots span:nth-child(3){animation-delay:0.3s;}
.mascots span:nth-child(4){animation-delay:0.45s;}
.mascots span:nth-child(5){animation-delay:0.6s;}
.mascots span:nth-child(6){animation-delay:0.75s;}
.mascots span:nth-child(7){animation-delay:0.9s;}
.mascots span:nth-child(8){animation-delay:1.05s;}

.label { font-family:'Fredoka',sans-serif; font-weight:600; font-size:12px; color:#7A6A7C;
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; margin-top:4px; }

.level-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; width:100%; max-width:360px; margin-bottom:14px; }
.level-card { background:white; border:3px solid var(--ink); border-radius:16px; padding:12px 4px 10px;
  text-align:center; cursor:pointer; box-shadow:0 5px 0 var(--ink); font-family:'Fredoka',sans-serif;
  position:relative;
  transition:transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease; }
.level-card > .code, .level-card > .age { pointer-events:none; }
.level-card:active { transform:translateY(2px); box-shadow:0 3px 0 var(--ink); }
.level-card .code { font-weight:700; font-size:22px; line-height:1.1; transition:font-size 0.2s; }
.level-card.selected .code { font-size:24px; }
.level-card .age { font-size:10px; color:#7A6A7C; margin-top:2px; font-weight:600; letter-spacing:0.5px; }

.subject-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:340px; margin-bottom:18px; }
.subject-card { background:white; border:3px solid var(--ink); border-radius:18px; padding:14px 6px 10px;
  text-align:center; cursor:pointer; box-shadow:0 5px 0 var(--ink); font-family:'Fredoka',sans-serif;
  transition:transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  position:relative; min-height:82px; }
.subject-card > .emoji, .subject-card > .name, .subject-card > .sub { pointer-events:none; }
.subject-card:active { transform:translateY(2px); box-shadow:0 3px 0 var(--ink); }
.subject-card .emoji { font-size:30px; display:block; margin-bottom:3px; line-height:1; transition:transform 0.2s; }
.subject-card.selected .emoji { transform:scale(1.15); }
.subject-card .name { font-weight:700; font-size:15px; line-height:1.1; }
.subject-card .sub { font-size:10px; color:#7A6A7C; margin-top:2px; font-weight:500; }

/* Real DOM badge (not a pseudo) — JS toggles display:flex when selected */
.check-badge {
  position:absolute;
  top:-10px;
  right:-10px;
  width:26px;
  height:26px;
  background:#3D2E3F;
  color:white;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:15px;
  border:3px solid white;
  box-shadow:0 3px 0 rgba(61,46,63,0.3);
  z-index:10;
  pointer-events:none;
  font-family:sans-serif;
}

.start-btn { background:var(--rose); color:white; border:4px solid var(--ink); border-radius:20px;
  padding:12px 36px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:20px;
  cursor:pointer; box-shadow:0 6px 0 var(--ink);
  transition:transform 0.15s, box-shadow 0.15s, background 0.3s, color 0.2s;
  letter-spacing:1.5px; text-shadow:2px 2px 0 rgba(0,0,0,0.15); position:relative; }
.start-btn:active { transform:translateY(4px); box-shadow:0 2px 0 var(--ink); }

/* Secondary button for modal (smaller, neutral style) */
.secondary-btn { background:white; color:var(--ink); border:3px solid var(--ink); border-radius:14px;
  padding:8px 20px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:14px;
  cursor:pointer; box-shadow:0 4px 0 var(--ink);
  transition:transform 0.15s, box-shadow 0.15s;
  letter-spacing:0.5px; }
.secondary-btn:active { transform:translateY(2px); box-shadow:0 2px 0 var(--ink); }

/* Mode selection grid */
.mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:320px; margin-top:8px; }
.mode-card { background:white; border:4px solid var(--ink); border-radius:22px; padding:20px 10px 16px;
  text-align:center; cursor:pointer; box-shadow:0 6px 0 var(--ink); font-family:'Fredoka',sans-serif;
  transition:transform 0.15s, box-shadow 0.15s, background 0.2s; position:relative; }
.mode-card:active { transform:translateY(4px); box-shadow:0 2px 0 var(--ink); }
.mode-card .mode-icon { font-size:52px; line-height:1; margin-bottom:6px; }
.mode-card .mode-name { font-weight:700; font-size:22px; line-height:1; margin-bottom:4px; }
.mode-card .mode-desc { font-size:11px; color:#7A6A7C; font-weight:500; line-height:1.4; }
.mode-card[data-mode="kids"]:hover, .mode-card[data-mode="kids"]:active { background:#FFF0E8; }
.mode-card[data-mode="adults"]:hover, .mode-card[data-mode="adults"]:active { background:#E8F0FF; }

/* Locked/coming soon badges */
.coming-soon { position:relative; }
.coming-soon::after { content:'COMING SOON'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(-8deg);
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:10px;
  background:var(--rose); color:white; padding:3px 10px; border-radius:999px;
  letter-spacing:1.5px; border:2px solid #C14777; box-shadow:0 2px 0 #C14777; z-index:3; }
.coming-soon > * { opacity:0.35; }

/* Start button reflects the selected subject color */
.start-btn[data-subject="math"]    { background:var(--mint);     color:var(--ink); text-shadow:2px 2px 0 rgba(255,255,255,0.5); }
.start-btn[data-subject="english"] { background:var(--sky);      color:var(--ink); text-shadow:2px 2px 0 rgba(255,255,255,0.5); }
.start-btn[data-subject="chinese"] { background:var(--rose);     color:white;      text-shadow:2px 2px 0 rgba(0,0,0,0.2); }
.start-btn[data-subject="mixed"]   { background:var(--sun);      color:var(--ink); text-shadow:2px 2px 0 rgba(255,255,255,0.5); }

.hint { position:absolute; top:60px; left:12px; right:12px;
  background:white; border:2.5px solid var(--ink); border-radius:13px; padding:7px 12px;
  font-family:'Fredoka',sans-serif; font-size:13px; font-weight:500; color:var(--ink);
  box-shadow:0 3px 0 var(--ink); z-index:10; text-align:center; animation:slideDown 0.3s ease; }
@keyframes slideDown { from{transform:translateY(-20px); opacity:0;} to{transform:translateY(0); opacity:1;} }

.phase-banner { position:absolute; top:50px; left:50%; transform:translateX(-50%);
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:12px;
  background:var(--ink); color:white; border-radius:999px; padding:4px 14px;
  z-index:9; letter-spacing:1px; box-shadow:0 3px 0 rgba(0,0,0,0.2); white-space:nowrap; }

/* Sound toggles */
.sound-controls { position:absolute; top:52px; right:12px; display:flex; flex-direction:column; gap:6px; z-index:11; }
.sound-btn { width:34px; height:34px; background:white; border:2.5px solid var(--ink);
  border-radius:999px; box-shadow:0 3px 0 var(--ink); display:flex; align-items:center; justify-content:center;
  font-size:15px; cursor:pointer; transition:transform 0.1s, opacity 0.15s; padding:0; line-height:1;
  position:relative; overflow:hidden; }
.sound-btn:active { transform:translateY(2px); box-shadow:0 1px 0 var(--ink); }
.sound-btn.off { opacity:0.5; background:#F0EBE0; overflow:visible; }
.sound-btn.off::after { content:''; position:absolute; width:24px; height:2.5px;
  background:var(--ink); transform:rotate(-35deg); border-radius:2px; }

/* Journey map - redesigned */
.journey-header { position:sticky; top:0; z-index:5;
  background:linear-gradient(180deg, #FFF8EC 0%, #FFF8EC 75%, rgba(255,248,236,0) 100%);
  padding:14px 16px 18px; text-align:center; width:100%; flex-shrink:0; }
.journey-title { font-family:'Fredoka',sans-serif; font-weight:700; font-size:24px;
  color:var(--ink); text-shadow:3px 3px 0 var(--sun); }
.journey-sub { font-family:'Fredoka',sans-serif; font-size:11px; color:#7A6A7C;
  letter-spacing:1.5px; text-transform:uppercase; margin-top:3px; font-weight:600; }

/* Legend row under header */
.journey-legend { display:flex; gap:6px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
.legend-chip { display:inline-flex; align-items:center; gap:5px;
  font-family:'Fredoka',sans-serif; font-size:10px; font-weight:600; color:var(--ink);
  background:white; border:2px solid var(--ink); border-radius:999px;
  padding:3px 9px; box-shadow:0 2px 0 var(--ink); }
.legend-swatch { width:10px; height:10px; border-radius:50%; border:1.5px solid var(--ink); }

.journey-map { position:relative; margin:8px auto 140px; }

.journey-svg { position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:1; }

.journey-node {
  position:absolute;
  width:68px; height:68px;
  border-radius:50%;
  border:4px solid var(--ink);
  background:white;
  box-shadow:0 5px 0 var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; font-family:'Fredoka',sans-serif;
  transform:translate(-50%, -50%);
  z-index:2; transition:box-shadow 0.1s;
}
.journey-node:active { box-shadow:0 2px 0 var(--ink); }
.journey-node .n-num {
  font-weight:700; font-size:22px; color:var(--ink); line-height:1;
}
.journey-node .n-stars {
  display:flex; gap:1px; margin-top:3px; line-height:1;
  font-size:10px; font-weight:700; letter-spacing:-0.5px;
}
.journey-node .n-stars .star { color:rgba(61,46,63,0.2); }
.journey-node .n-stars .star.filled { color:#E6A400; text-shadow:0 0 3px rgba(230,164,0,0.4); }

.journey-node.locked {
  background:#E8E4E8;
  box-shadow:0 3px 0 rgba(61,46,63,0.25);
  border-color:rgba(61,46,63,0.45);
  cursor:default;
}
.journey-node.locked .n-num { color:rgba(61,46,63,0.4); font-size:20px; }

.journey-node.current {
  background:var(--sun);
  animation:pulseNodeAbs 1.3s ease-in-out infinite;
  z-index:3;
}
.journey-node.current .n-num { font-size:24px; }
@keyframes pulseNodeAbs {
  0%,100% { transform:translate(-50%,-50%) scale(1);
    box-shadow:0 5px 0 var(--ink), 0 0 0 0 rgba(255,214,107,0.8); }
  50% { transform:translate(-50%,-50%) scale(1.08);
    box-shadow:0 5px 0 var(--ink), 0 0 0 16px rgba(255,214,107,0); }
}

.journey-node.completed { background:var(--mint); }

.journey-node.boss {
  width:82px; height:82px;
  background:var(--rose); border-width:5px;
}
.journey-node.boss .n-num { color:white; font-size:24px; text-shadow:2px 2px 0 rgba(0,0,0,0.2); }
.journey-node.boss.locked { background:#D4AAB7; }
.journey-node.boss.locked .n-num { color:rgba(255,255,255,0.75); }
.journey-node.current.boss { animation:pulseBossAbs 1.3s ease-in-out infinite; }
@keyframes pulseBossAbs {
  0%,100% { transform:translate(-50%,-50%) scale(1);
    box-shadow:0 5px 0 var(--ink), 0 0 0 0 rgba(255,143,184,0.85); }
  50% { transform:translate(-50%,-50%) scale(1.06);
    box-shadow:0 5px 0 var(--ink), 0 0 0 18px rgba(255,143,184,0); }
}

.journey-node .n-badge {
  position:absolute; top:-8px; right:-10px;
  width:30px; height:30px;
  background:white; border:2.5px solid var(--ink); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; box-shadow:0 2px 0 var(--ink);
  animation:badgeWiggle 3.2s ease-in-out infinite;
}
@keyframes badgeWiggle {
  0%,92%,100% { transform:rotate(0); }
  94% { transform:rotate(-12deg); }
  96% { transform:rotate(12deg); }
  98% { transform:rotate(-6deg); }
}
.journey-node.locked .n-badge { filter:grayscale(0.7); opacity:0.65; animation:none; }
.journey-node .n-lock {
  position:absolute; top:-6px; right:-6px;
  width:24px; height:24px;
  background:white; border:2px solid var(--ink); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:11px;
  box-shadow:0 2px 0 var(--ink);
}

/* Checkpoint banner every 25 levels */
.journey-checkpoint {
  position:absolute; left:50%; transform:translate(-50%, -50%);
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:11px;
  color:#6B4FA0; letter-spacing:2.5px;
  background:white; border:2.5px solid #6B4FA0; border-radius:999px;
  padding:4px 14px; white-space:nowrap;
  box-shadow:0 3px 0 #6B4FA0; z-index:2; pointer-events:none;
}

/* Level start modal */
.level-start { position:absolute; inset:0; z-index:90;
  background:rgba(61,46,63,0.5); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; padding:16px; }
.level-start-card { background:white; border:4px solid var(--ink); border-radius:26px;
  padding:22px 20px; box-shadow:0 7px 0 var(--ink); max-width:320px; width:100%; text-align:center;
  animation:popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
.level-start-card h2 { font-family:'Fredoka',sans-serif; font-size:26px; font-weight:700; margin-bottom:4px; }
.level-start-card .type { font-family:'Fredoka',sans-serif; font-size:12px; color:#6B4FA0;
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; }
.level-start-card .info { font-family:'Fredoka',sans-serif; font-size:14px; color:#4A3D4C;
  line-height:1.6; margin-bottom:16px; }
.level-start-card .mascot { font-size:56px; margin-bottom:4px; display:block; animation:bounce 1.5s ease-in-out infinite; }

.feedback-toast { position:absolute; top:45%; left:50%;
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px;
  z-index:40; pointer-events:none; animation:toast 1s ease forwards;
  text-shadow:3px 3px 0 rgba(61,46,63,0.25); white-space:nowrap; }
@keyframes toast {
  0%{opacity:0; transform:translate(-50%, 0) scale(0.4);}
  20%{opacity:1; transform:translate(-50%, -20px) scale(1.2);}
  80%{opacity:1; transform:translate(-50%, -30px) scale(1);}
  100%{opacity:0; transform:translate(-50%, -70px) scale(1);}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="gameCanvas"></canvas>

  <div class="hud" id="hud" style="display:none;">
    <button class="back-btn" id="backBtn" title="Back to map">✕</button>
    <div class="hud-pill lives">❤️ <span id="livesTxt">5</span></div>
    <div class="hud-pill level">📚 <span id="levelTxt">P1</span> · <span id="levelNumTxt">1</span></div>
    <div class="hud-pill coins">💰 <span id="coinsTxt">60</span></div>
  </div>

  <div class="phase-banner" id="phaseBanner" style="display:none;">PREP</div>
  <div class="hint" id="hint" style="display:none;"></div>

  <div class="sound-controls" style="display:none;" id="soundControls">
    <button class="sound-btn" id="musicBtn" title="Toggle music">🎵</button>
    <button class="sound-btn" id="sfxBtn" title="Toggle sound effects">🔊</button>
  </div>

  <button class="send-wave-btn hidden" id="sendWaveBtn">START ROUND 🌊</button>

  <div class="tower-bar" id="towerBar" style="display:none;"></div>

  <!-- Mode selection (first screen) -->
  <div class="screen" id="modeScreen">
    <div class="mascots"><span>🐰</span><span>🐻</span><span>🚓</span><span>🚗</span><span>👸</span><span>🐼</span><span>🦄</span><span>🦉</span></div>
    <div class="title">Kawaii<br>Defenders</div>
    <div class="subtitle">Learn while you defend! 🎓🏰</div>
    <div class="label">Choose your mode</div>
    <div class="mode-grid" id="modeGrid">
      <div class="mode-card" data-mode="kids">
        <div class="mode-icon">🧒</div>
        <div class="mode-name">Kids</div>
        <div class="mode-desc">Singapore MOE syllabus<br>K2 · P1 · P2 · P3</div>
      </div>
      <div class="mode-card" data-mode="adults">
        <div class="mode-icon">🧑</div>
        <div class="mode-name">Adults</div>
        <div class="mode-desc">Language learning<br>Korean · More coming!</div>
      </div>
    </div>
  </div>

  <!-- Start screen (adapts to mode) -->
  <div class="screen hidden" id="startScreen">
    <!-- Content generated dynamically by buildStartScreen() -->
  </div>

  <!-- Journey map -->
  <div class="screen hidden" id="journeyScreen">
    <div class="journey-header">
      <div class="journey-title" id="journeyTitle">P1 · Math</div>
      <div class="journey-sub" id="journeySub">500 levels · 50 boss battles</div>
      <div class="journey-legend">
        <span class="legend-chip"><span class="legend-swatch" style="background:#FFD66B;"></span>Now</span>
        <span class="legend-chip"><span class="legend-swatch" style="background:#A8E6CF;"></span>Done</span>
        <span class="legend-chip"><span class="legend-swatch" style="background:#FF8FB8;"></span>Boss</span>
        <span class="legend-chip"><span class="legend-swatch" style="background:#E8E4E8;"></span>Locked</span>
      </div>
    </div>
    <div class="journey-map" id="journeyMap"></div>
    <button class="back-btn floating" id="journeyBackBtn" style="top:10px; left:10px;">←</button>
  </div>

  <!-- Quiz overlay -->
  <div class="quiz-overlay" id="quizOverlay" style="display:none;"></div>

  <!-- Tower upgrade popup -->
  <div class="tower-popup" id="towerPopup" style="display:none;"></div>

  <!-- Level start/end modal -->
  <div class="level-start" id="levelStartModal" style="display:none;"></div>
</div>

<script>
// ============== AUDIO ENGINE ==============
const audio = {
  ctx:null, master:null, musicBus:null, sfxBus:null,
  musicOn:true, sfxOn:true, musicActive:false, musicTimer:null,
  currentStep:0, nextStepTime:0, tempoMul:1.0, lastShootAt:0,
  init() {
    if (this.ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      this.ctx = new AC();
      this.master = this.ctx.createGain(); this.master.gain.value = 0.7;
      this.master.connect(this.ctx.destination);
      this.musicBus = this.ctx.createGain(); this.musicBus.gain.value = 0.25;
      this.musicBus.connect(this.master);
      this.sfxBus = this.ctx.createGain(); this.sfxBus.gain.value = 0.55;
      this.sfxBus.connect(this.master);
    } catch(e) {}
  },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume().catch(()=>{}); },
  tone(freq, dur, opts={}) {
    if (!this.ctx || !this.sfxOn) return;
    const t = this.ctx.currentTime + (opts.delay || 0);
    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    if (opts.sweepTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1, opts.sweepTo), t + dur);
    const vol = opts.volume != null ? opts.volume : 0.3;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(this.sfxBus);
    osc.start(t); osc.stop(t + dur + 0.05);
  },
  noise(dur, opts={}) {
    if (!this.ctx || !this.sfxOn) return;
    const t = this.ctx.currentTime + (opts.delay || 0);
    const bs = Math.max(1, Math.floor(this.ctx.sampleRate * dur));
    const buf = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<bs;i++) d[i] = Math.random()*2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter();
    f.type = opts.filterType || 'lowpass';
    f.frequency.setValueAtTime(opts.cutoffStart || opts.cutoff || 800, t);
    if (opts.cutoffEnd) f.frequency.exponentialRampToValueAtTime(opts.cutoffEnd, t + dur);
    const g = this.ctx.createGain();
    const vol = opts.volume != null ? opts.volume : 0.2;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f).connect(g).connect(this.sfxBus);
    src.start(t); src.stop(t + dur + 0.05);
  },
  arp(freqs, noteDur, type='sine', vol=0.26) {
    freqs.forEach((f, i) => { if (f) this.tone(f, noteDur * 1.2, { type, volume: vol, delay: i * noteDur }); });
  },
  play(name) {
    if (!this.ctx || !this.sfxOn) return;
    this.resume();
    const now = performance.now();
    switch (name) {
      case 'select': this.tone(880, 0.05, {type:'triangle', volume:0.22}); break;
      case 'place': this.tone(700, 0.12, {sweepTo:320, type:'sine', volume:0.3});
        this.tone(1100, 0.08, {sweepTo:550, type:'sine', volume:0.15, delay:0.02}); break;
      case 'upgrade': this.arp([523.25, 659.25, 783.99, 1046.50, 1318.51], 0.06, 'sine', 0.3); break;
      case 'sell': this.tone(500, 0.15, {sweepTo:200, type:'triangle', volume:0.22}); break;
      case 'invalid': this.tone(180, 0.12, {type:'square', volume:0.12});
        this.tone(150, 0.1, {type:'square', volume:0.1, delay:0.05}); break;
      case 'shoot':
        if (now - this.lastShootAt < 70) return;
        this.lastShootAt = now;
        this.tone(1400, 0.05, {sweepTo:700, type:'sawtooth', volume:0.08}); break;
      case 'hit': this.noise(0.06, {cutoff:500, volume:0.12}); break;
      case 'defeat': this.arp([523.25, 659.25, 783.99], 0.045, 'sine', 0.22); break;
      case 'heartlost': this.tone(440, 0.35, {sweepTo:140, type:'triangle', volume:0.3}); break;
      case 'wave': this.noise(0.5, {filterType:'bandpass', cutoffStart:300, cutoffEnd:2400, volume:0.28});
        this.tone(220, 0.4, {sweepTo:660, type:'sawtooth', volume:0.12, delay:0.1}); break;
      case 'quiz': this.arp([523.25, 659.25, 783.99, 1046.50], 0.11, 'sine', 0.28); break;
      case 'correct': this.arp([523.25, 659.25, 783.99, 1046.50], 0.07, 'sine', 0.3);
        this.tone(1318.51, 0.22, {type:'sine', volume:0.2, delay:0.28}); break;
      case 'wrong': this.arp([392.0, 349.23, 293.66], 0.14, 'triangle', 0.22); break;
      case 'perfect': {
        const p = [[523.25,0],[659.25,0.1],[783.99,0.2],[1046.50,0.3],[1318.51,0.45],[1046.50,0.6],[1318.51,0.7],[1568,0.85]];
        p.forEach(([f,d]) => this.tone(f, 0.3, {type:'sine', volume:0.28, delay:d})); break;
      }
      case 'victory': {
        const v = [[523.25,0],[659.25,0.12],[783.99,0.24],[1046.50,0.36],[880,0.55],[1046.50,0.7],[1318.51,0.85],[1567.98,1.0]];
        v.forEach(([f,d]) => this.tone(f, 0.35, {type:'sine', volume:0.3, delay:d})); break;
      }
      case 'defeat_game': this.arp([349.23, 311.13, 261.63, 220], 0.22, 'triangle', 0.26); break;
      case 'click': this.tone(700, 0.04, {type:'sine', volume:0.18}); break;
      case 'boss': {
        const b = [[130.81,0],[130.81,0.15],[174.61,0.3],[130.81,0.45],[196,0.6],[130.81,0.75]];
        b.forEach(([f,d]) => this.tone(f, 0.2, {type:'sawtooth', volume:0.2, delay:d})); break;
      }
    }
  },
  startMusic() {
    if (!this.ctx || !this.musicOn || this.musicActive) return;
    this.musicActive = true; this.currentStep = 0;
    this.nextStepTime = this.ctx.currentTime + 0.1;
    this._loop();
  },
  stopMusic() {
    this.musicActive = false;
    if (this.musicTimer) { clearTimeout(this.musicTimer); this.musicTimer = null; }
  },
  setTempo(mul) { this.tempoMul = mul; },
  _loop() {
    if (!this.musicActive || !this.ctx) return;
    const bpm = 92 * this.tempoMul;
    const stepDur = (60 / bpm) / 2;
    const MEL = [523,0,659,0,784,0,659,0, 880,0,784,0,659,0,523,0, 587,0,659,0,784,0,880,0, 784,0,587,0,523,0,0,0];
    const BASS = [130,0,0,0,196,0,0,0, 220,0,0,0,164,0,0,0, 174,0,0,0,196,0,0,0, 196,0,0,0,130,0,0,0];
    while (this.nextStepTime < this.ctx.currentTime + 0.25) {
      const step = this.currentStep % MEL.length;
      if (MEL[step]) this._note(MEL[step], this.nextStepTime, stepDur*0.7, 'sine', 0.13);
      if (BASS[step]) this._note(BASS[step], this.nextStepTime, stepDur*1.6, 'triangle', 0.09);
      if (step % 4 === 2) this._hat(this.nextStepTime);
      this.nextStepTime += stepDur;
      this.currentStep++;
    }
    this.musicTimer = setTimeout(() => this._loop(), 30);
  },
  _note(freq, t, dur, type, vol) {
    const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g).connect(this.musicBus);
    osc.start(t); osc.stop(t + dur + 0.05);
  },
  _hat(t) {
    const bs = Math.floor(this.ctx.sampleRate * 0.04);
    const buf = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<bs;i++) d[i] = Math.random()*2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 5000;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.05, t + 0.001);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
    src.connect(f).connect(g).connect(this.musicBus); src.start(t);
  },
  toggleMusic() { this.musicOn = !this.musicOn; if (this.musicOn) this.startMusic(); else this.stopMusic(); return this.musicOn; },
  toggleSfx() { this.sfxOn = !this.sfxOn; return this.sfxOn; },
};

// ============== QUESTIONS ==============
const Q = {
  K2: {
    math: [
      {q:"Count: 🍎🍎🍎", opts:["2","3","4","5"], a:1, topic:"NEL · Counting to 10", exp:"Count each apple: 1… 2… 3! There are 3 apples. 🍎🍎🍎 = 3"},

      {q:"마리 counts:", opts:["things","people","animals","cups"], a:2, ml:421, topic:"TOPIK I · 단위", exp:"마리 = counter for animals. 고양이 한 마리 = 1 cat! 🐾"},
      {q:"고양이 = ?", opts:["dog","cat","bird","fish"], a:1, ml:101, topic:"TOPIK I · 동물", exp:"고양이 = cat. Korean cats say 야옹! 🐱"},
      {q:"강아지 = ?", opts:["cat","puppy/dog","rabbit","bird"], a:1, ml:101, topic:"TOPIK I · 동물", exp:"강아지 = puppy. 개 = dog (general). 🐶"},
      {q:"저는 ___이에요:", opts:["I am ___","You are ___","This is ___","There is ___"], a:0, ml:281, topic:"TOPIK I · 자기소개", exp:"저는 ___이에요 = I am ___. 저=I, 는=topic, 이에요=am! 👤"},
      {q:"이것 means:", opts:["that thing","this thing","what thing","which"], a:1, ml:281, topic:"TOPIK I · 지시사", exp:"이것 = this thing (near me). 그것 = that (near you). 저것 = that (far). 👆"},
      {q:"___이/가 아니에요:", opts:["is ___","is not ___","has ___","wants ___"], a:1, ml:281, topic:"TOPIK I · 부정", exp:"이/가 아니에요 = is not. 학생이 아니에요 = I'm not a student! ❌"},
      // --- Body Parts ---
      {q:"머리 means?", opts:["hand","head","foot","eye"], a:1, ml:101, topic:"TOPIK I · 신체", exp:"머리 (meori) = head/hair. 머리가 아파요 = I have a headache! 🤕"},
      {q:"눈 means?", opts:["ear","nose","eye","mouth"], a:2, ml:101, topic:"TOPIK I · 신체", exp:"눈 (nun) = eye. Also means snow! 눈이 와요 = It's snowing / Eyes come. Context matters! 👁️"},
      {q:"코 means?", opts:["ear","nose","mouth","hand"], a:1, ml:101, topic:"TOPIK I · 신체", exp:"코 (ko) = nose. 코가 높다 = nose is tall (literal). 👃"},
      {q:"입 means?", opts:["eye","ear","nose","mouth"], a:3, ml:101, topic:"TOPIK I · 신체", exp:"입 (ip) = mouth. 입이 크다 = big mouth! 👄"},
      {q:"귀 means?", opts:["eye","mouth","ear","nose"], a:2, ml:101, topic:"TOPIK I · 신체", exp:"귀 (gwi) = ear. 귀가 아파요 = My ear hurts! 👂"},
      {q:"손 means?", opts:["foot","hand","arm","leg"], a:1, ml:101, topic:"TOPIK I · 신체", exp:"손 (son) = hand. 손을 씻으세요 = Please wash your hands! ✋"},
      {q:"발 means?", opts:["hand","arm","foot","head"], a:2, ml:101, topic:"TOPIK I · 신체", exp:"발 (bal) = foot. 발이 아파요 = My foot hurts! 🦶"},
      {q:"배 means?", opts:["back","stomach","chest","arm"], a:1, ml:101, topic:"TOPIK I · 신체", exp:"배 (bae) = stomach. Also means pear or boat! 배고파요 = I'm hungry! 🤰"},
      {q:"다리 means?", opts:["arm","hand","leg","head"], a:2, ml:101, topic:"TOPIK I · 신체", exp:"다리 (dari) = leg. Also means bridge! 다리가 길어요 = Long legs! 🦵"},
      {q:"어깨 means?", opts:["knee","shoulder","elbow","wrist"], a:1, ml:101, topic:"TOPIK I · 신체", exp:"어깨 (eokkae) = shoulder. 어깨가 아파요 = My shoulder hurts! 💪"},
      {q:"아프다 means?", opts:["happy","hungry","sick/hurt","tired"], a:2, ml:101, topic:"TOPIK I · 신체", exp:"아프다 (apeuda) = to be sick/hurt. 어디가 아파요? = Where does it hurt? 🤒"},
      // --- Weather & Seasons ---
      {q:"날씨 means?", opts:["time","weather","season","temperature"], a:1, ml:101, topic:"TOPIK I · 날씨", exp:"날씨 (nalssi) = weather. 오늘 날씨가 좋아요 = The weather is nice today! 🌤️"},
      {q:"비 means?", opts:["snow","rain","wind","cloud"], a:1, ml:101, topic:"TOPIK I · 날씨", exp:"비 (bi) = rain. 비가 와요 = It's raining! 비 comes using 오다 (come)! 🌧️"},
      {q:"눈 (weather) means?", opts:["rain","snow","wind","sun"], a:1, ml:101, topic:"TOPIK I · 날씨", exp:"눈 (nun) = snow (also = eye!). 눈이 와요 = It's snowing! ❄️"},
      {q:"바람 means?", opts:["rain","snow","wind","cloud"], a:2, ml:101, topic:"TOPIK I · 날씨", exp:"바람 (baram) = wind. 바람이 불어요 = The wind is blowing! 💨"},
      {q:"덥다 means?", opts:["cold","hot","warm","cool"], a:1, ml:101, topic:"TOPIK I · 날씨", exp:"덥다 (deopda) = hot (weather). 오늘 너무 더워요 = It's so hot today! 🥵"},
      {q:"춥다 means?", opts:["hot","cold","warm","cool"], a:1, ml:101, topic:"TOPIK I · 날씨", exp:"춥다 (chupda) = cold (weather). 겨울에 추워요 = It's cold in winter! 🥶"},
      {q:"봄 means?", opts:["spring","summer","autumn","winter"], a:0, ml:101, topic:"TOPIK I · 계절", exp:"봄 (bom) = spring. 봄에 꽃이 피어요 = Flowers bloom in spring! 🌸"},
      {q:"여름 means?", opts:["spring","summer","autumn","winter"], a:1, ml:101, topic:"TOPIK I · 계절", exp:"여름 (yeoreum) = summer. 여름에 바다에 가요 = Go to the sea in summer! 🏖️"},
      {q:"가을 means?", opts:["spring","summer","autumn","winter"], a:2, ml:101, topic:"TOPIK I · 계절", exp:"가을 (gaeul) = autumn/fall. 가을에 단풍이 예뻐요 = Autumn leaves are pretty! 🍂"},
      {q:"겨울 means?", opts:["spring","summer","autumn","winter"], a:3, ml:101, topic:"TOPIK I · 계절", exp:"겨울 (gyeoul) = winter. 겨울에 눈이 와요 = It snows in winter! ⛄"},
      // --- Clothing ---
      {q:"옷 means?", opts:["shoes","hat","clothes","bag"], a:2, ml:101, topic:"TOPIK I · 의류", exp:"옷 (ot) = clothes. 옷을 입다 = to wear clothes. 새 옷 = new clothes! 👔"},
      {q:"신발 means?", opts:["hat","clothes","shoes","socks"], a:2, ml:101, topic:"TOPIK I · 의류", exp:"신발 (sinbal) = shoes. 신발을 신다 = to wear shoes. 벗다 = take off! 👟"},
      {q:"모자 means?", opts:["shoes","hat","gloves","scarf"], a:1, ml:101, topic:"TOPIK I · 의류", exp:"모자 (moja) = hat/cap. 모자를 쓰다 = to wear a hat! 🧢"},
      {q:"입다 means?", opts:["to eat","to wear (clothes)","to read","to buy"], a:1, ml:101, topic:"TOPIK I · 의류", exp:"입다 (ipda) = to wear (upper body/clothes). 셔츠를 입어요 = I wear a shirt! 👕"},
      {q:"신다 means?", opts:["to wear (hat)","to wear (shoes)","to wear (clothes)","to take off"], a:1, ml:101, topic:"TOPIK I · 의류", exp:"신다 (sinda) = to wear (shoes/socks). Korean has different 'wear' verbs for each body part! 👟"},
      // --- Transportation ---
      {q:"버스 means?", opts:["train","taxi","bus","airplane"], a:2, ml:351, topic:"TOPIK I · 교통", exp:"버스 (beoseu) = bus. Loanword from English! 버스를 타다 = ride a bus! 🚌"},
      {q:"지하철 means?", opts:["bus","subway","train","taxi"], a:1, ml:351, topic:"TOPIK I · 교통", exp:"지하철 (jihacheol) = subway. 지하=underground, 철=railroad! 🚇"},
      {q:"택시 means?", opts:["bus","train","subway","taxi"], a:3, ml:351, topic:"TOPIK I · 교통", exp:"택시 (taeksi) = taxi. Loanword! 택시를 타요 = I take a taxi! 🚕"},
      {q:"비행기 means?", opts:["bus","ship","train","airplane"], a:3, ml:351, topic:"TOPIK I · 교통", exp:"비행기 (bihaenggi) = airplane. 비행=flight, 기=machine! ✈️"},
      {q:"타다 means?", opts:["to walk","to ride/take","to drive","to stop"], a:1, ml:351, topic:"TOPIK I · 교통", exp:"타다 (tada) = to ride/take (transport). 버스를 타요 = I take the bus! 🚌"},
      {q:"내리다 means?", opts:["to get on","to get off","to drive","to wait"], a:1, ml:351, topic:"TOPIK I · 교통", exp:"내리다 (naerida) = to get off. 여기서 내리세요 = Get off here! 🚏"},
      {q:"역 means?", opts:["bus stop","train station","airport","parking"], a:1, ml:351, topic:"TOPIK I · 교통", exp:"역 (yeok) = station. 서울역 = Seoul Station. 지하철역 = subway station! 🚉"},
      {q:"걷다 means?", opts:["to run","to walk","to sit","to stand"], a:1, ml:351, topic:"TOPIK I · 교통", exp:"걷다 (geotda) = to walk. Irregular verb! 걸어요 (polite). 걸어서 가요 = Go on foot! 🚶"},
      // --- Shopping & Money ---
      {q:"얼마예요? means?", opts:["What is this?","How much?","Where is it?","When?"], a:1, ml:351, topic:"TOPIK I · 쇼핑", exp:"얼마예요? = How much is it? 이거 얼마예요? = How much is this? Essential for shopping! 💰"},
      {q:"원 means?", opts:["dollar","won (currency)","euro","yen"], a:1, ml:351, topic:"TOPIK I · 쇼핑", exp:"원 (won) = Korean currency unit. 천 원 = 1,000 won (~$0.75 USD). 💵"},
      {q:"싸다 means?", opts:["expensive","cheap","free","heavy"], a:1, ml:351, topic:"TOPIK I · 쇼핑", exp:"싸다 (ssada) = cheap. Opposite of 비싸다 (expensive). 싸요! = It's cheap! 💸"},
      {q:"가게 means?", opts:["house","school","store/shop","restaurant"], a:2, ml:351, topic:"TOPIK I · 쇼핑", exp:"가게 (gage) = store/shop. 편의점 = convenience store! 🏪"},
      {q:"카드 means?", opts:["cash","card","check","coin"], a:1, ml:351, topic:"TOPIK I · 쇼핑", exp:"카드 (kadeu) = card. 카드로 할게요 = I'll pay by card! 💳"},
      {q:"영수증 means?", opts:["menu","card","receipt","change"], a:2, ml:351, topic:"TOPIK I · 쇼핑", exp:"영수증 (yeongsujeung) = receipt. 영수증 주세요 = Receipt please! 🧾"},
      {q:"깎아 주세요:", opts:["Wrap it please","Discount please","Give me more","Change please"], a:1, ml:351, topic:"TOPIK I · 쇼핑", exp:"깎아 주세요 = Please give a discount! 깎다 = to cut/reduce price. Use at markets! 🏷️"},
      // --- Emotions & States ---
      {q:"기쁘다 means?", opts:["sad","happy/glad","angry","bored"], a:1, ml:351, topic:"TOPIK I · 감정", exp:"기쁘다 (gippeuda) = glad/happy. 만나서 기뻐요 = Glad to meet you! 😊"},
      {q:"슬프다 means?", opts:["happy","angry","sad","scared"], a:2, ml:351, topic:"TOPIK I · 감정", exp:"슬프다 (seulpeuda) = sad. 슬픈 영화 = sad movie. 너무 슬퍼요! 😢"},
      {q:"화나다 means?", opts:["happy","sad","angry","scared"], a:2, ml:351, topic:"TOPIK I · 감정", exp:"화나다 (hwanada) = to be angry. 화가 났어요 = I got angry! 😡"},
      {q:"무섭다 means?", opts:["happy","sad","angry","scary/scared"], a:3, ml:351, topic:"TOPIK I · 감정", exp:"무섭다 (museopda) = scary/scared. 무서워요! = I'm scared! 😱"},
      {q:"피곤하다 means?", opts:["hungry","thirsty","tired","sick"], a:2, ml:351, topic:"TOPIK I · 감정", exp:"피곤하다 (pigonhada) = tired. 오늘 너무 피곤해요 = So tired today! 😫"},
      {q:"심심하다 means?", opts:["hungry","bored","sleepy","angry"], a:1, ml:351, topic:"TOPIK I · 감정", exp:"심심하다 (simsimhada) = bored. 심심해요! 뭐 할까요? = I'm bored! What shall we do? 😐"},
      {q:"걱정하다 means?", opts:["to enjoy","to worry","to relax","to forget"], a:1, ml:351, topic:"TOPIK I · 감정", exp:"걱정하다 (geokjeonghada) = to worry. 걱정하지 마세요 = Don't worry! 😟"},
      {q:"부끄럽다 means?", opts:["proud","shy/embarrassed","brave","angry"], a:1, ml:351, topic:"TOPIK I · 감정", exp:"부끄럽다 (bukkeureopda) = shy/embarrassed. 부끄러워요! = I'm embarrassed! 😳"},
      {q:"외롭다 means?", opts:["happy","busy","lonely","full"], a:2, ml:351, topic:"TOPIK I · 감정", exp:"외롭다 (oeropda) = lonely. 혼자서 외로워요 = Lonely being alone. 🥺"},
      // --- Occupations ---
      {q:"학생 means?", opts:["teacher","student","doctor","worker"], a:1, ml:351, topic:"TOPIK I · 직업", exp:"학생 (haksaeng) = student. 학=study, 생=life/person. 🎒"},
      {q:"선생님 means?", opts:["student","doctor","teacher","friend"], a:2, ml:351, topic:"TOPIK I · 직업", exp:"선생님 (seonsaengnim) = teacher. 님 = honorific suffix. Also used for any professional! 👨‍🏫"},
      {q:"의사 means?", opts:["nurse","doctor","dentist","teacher"], a:1, ml:351, topic:"TOPIK I · 직업", exp:"의사 (uisa) = doctor. 의=medicine, 사=person. 병원에 의사가 있어요! 👨‍⚕️"},
      {q:"경찰 means?", opts:["firefighter","soldier","police","driver"], a:2, ml:351, topic:"TOPIK I · 직업", exp:"경찰 (gyeongchal) = police. 경찰관 = police officer. 🚔"},
      {q:"요리사 means?", opts:["driver","cook/chef","nurse","singer"], a:1, ml:351, topic:"TOPIK I · 직업", exp:"요리사 (yorisa) = cook/chef. 요리=cooking, 사=person. 요리를 잘해요! 👨‍🍳"},
      {q:"가수 means?", opts:["actor","dancer","singer","writer"], a:2, ml:351, topic:"TOPIK I · 직업", exp:"가수 (gasu) = singer. 가=song, 수=person. K-pop 가수! 🎤"},
      {q:"회사원 means?", opts:["teacher","office worker","doctor","student"], a:1, ml:351, topic:"TOPIK I · 직업", exp:"회사원 (hoesawon) = office worker. 회사=company, 원=member. 🏢"},
      // --- Hobbies & Activities ---
      {q:"운동 means?", opts:["music","exercise/sports","reading","cooking"], a:1, ml:351, topic:"TOPIK I · 취미", exp:"운동 (undong) = exercise/sports. 운동하다 = to exercise. 운동을 좋아해요! 🏃"},
      {q:"음악 means?", opts:["movie","music","dance","book"], a:1, ml:351, topic:"TOPIK I · 취미", exp:"음악 (eumak) = music. 음악을 듣다 = to listen to music. K-pop! 🎵"},
      {q:"영화 means?", opts:["music","drama","movie","book"], a:2, ml:351, topic:"TOPIK I · 취미", exp:"영화 (yeonghwa) = movie/film. 영화를 봐요 = I watch a movie! 🎬"},
      {q:"사진 means?", opts:["music","video","painting","photo"], a:3, ml:351, topic:"TOPIK I · 취미", exp:"사진 (sajin) = photo. 사진을 찍다 = to take a photo! 📷"},
      {q:"요리 means?", opts:["exercise","cooking","reading","singing"], a:1, ml:351, topic:"TOPIK I · 취미", exp:"요리 (yori) = cooking. 요리하다 = to cook. 요리를 잘해요 = I cook well! 🍳"},
      {q:"노래 means?", opts:["dance","music","song","movie"], a:2, ml:351, topic:"TOPIK I · 취미", exp:"노래 (norae) = song. 노래를 부르다 = to sing a song. 노래방 = karaoke! 🎶"},
      {q:"여행하다 means?", opts:["to study","to travel","to work","to exercise"], a:1, ml:351, topic:"TOPIK I · 취미", exp:"여행하다 (yeohaenghada) = to travel. 여행 가고 싶어요 = I want to travel! ✈️"},
      {q:"수영 means?", opts:["running","cycling","swimming","hiking"], a:2, ml:351, topic:"TOPIK I · 취미", exp:"수영 (suyeong) = swimming. 수영하다 = to swim. 수영장 = swimming pool! 🏊"},
      {q:"등산 means?", opts:["swimming","cycling","running","hiking"], a:3, ml:351, topic:"TOPIK I · 취미", exp:"등산 (deungsan) = hiking/mountain climbing. 등=climb, 산=mountain! 🏔️"},
      // --- More Verbs ---
      {q:"마시다 = ?", opts:["to eat","to drink","to cook","to wash"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"마시다 (masida) = to drink. 물을 마셔요 = I drink water! 🥤"},
      {q:"듣다 = ?", opts:["to speak","to read","to listen","to see"], a:2, ml:161, topic:"TOPIK I · 동사", exp:"듣다 (deutda) = to listen. Irregular! 들어요 (polite). 음악을 들어요! 👂"},
      {q:"말하다 = ?", opts:["to listen","to speak/say","to read","to write"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"말하다 (malhada) = to speak/say. 한국어로 말해 주세요 = Please speak in Korean! 🗣️"},
      {q:"알다 = ?", opts:["to forget","to know","to learn","to teach"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"알다 (alda) = to know. 알아요 = I know. 몰라요 = I don't know! 🧠"},
      {q:"모르다 = ?", opts:["to know","to not know","to forget","to remember"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"모르다 (moreuda) = to not know. 몰라요 = I don't know. Opposite of 알다! ❓"},
      {q:"만나다 = ?", opts:["to leave","to call","to meet","to miss"], a:2, ml:161, topic:"TOPIK I · 동사", exp:"만나다 (mannada) = to meet. 친구를 만나요 = I meet a friend! 🤝"},
      {q:"주다 = ?", opts:["to take","to give","to buy","to sell"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"주다 (juda) = to give. 줘요 (polite). 선물을 줘요 = I give a present! 🎁"},
      {q:"받다 = ?", opts:["to give","to receive","to send","to throw"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"받다 (batda) = to receive. 선물을 받았어요 = I received a present! 📬"},
      {q:"걸다 = ?", opts:["to walk","to call (phone)","to hang","to run"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"걸다 (geolda) = to call/hang. 전화를 걸다 = to make a phone call! 📞"},
      {q:"앉다 = ?", opts:["to stand","to sit","to lie down","to run"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"앉다 (anda) = to sit. 앉으세요 = Please sit down! 🪑"},
      {q:"서다 = ?", opts:["to sit","to stand","to walk","to fall"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"서다 (seoda) = to stand. 여기 서세요 = Stand here please! 🧍"},
      {q:"열다 = ?", opts:["to close","to open","to lock","to push"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"열다 (yeolda) = to open. 문을 열어요 = Open the door! Opposite: 닫다 (close). 🚪"},
      {q:"닫다 = ?", opts:["to open","to close","to lock","to break"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"닫다 (datda) = to close. 창문을 닫아요 = Close the window! 🪟"},
      {q:"기다리다 = ?", opts:["to hurry","to wait","to leave","to arrive"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"기다리다 (gidarida) = to wait. 잠깐만 기다려 주세요 = Please wait a moment! ⏳"},
      {q:"배우다 = ?", opts:["to teach","to learn","to study","to forget"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"배우다 (baeuda) = to learn. 한국어를 배워요 = I'm learning Korean! 📖"},
      {q:"가르치다 = ?", opts:["to learn","to study","to teach","to read"], a:2, ml:161, topic:"TOPIK I · 동사", exp:"가르치다 (gareuchida) = to teach. 선생님이 가르쳐요 = The teacher teaches! 👩‍🏫"},
      {q:"놀다 = ?", opts:["to work","to play/hang out","to sleep","to study"], a:1, ml:161, topic:"TOPIK I · 동사", exp:"놀다 (nolda) = to play/hang out. 같이 놀아요! = Let's hang out together! 🎉"},
      // --- More Adjectives ---
      {q:"작다 = ?", opts:["big","small","tall","heavy"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"작다 (jakda) = small. Opposite of 크다 (big). 작은 집 = small house! 🏠"},
      {q:"길다 = ?", opts:["short","long","wide","narrow"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"길다 (gilda) = long. 머리가 길어요 = Hair is long! Opposite: 짧다 (short). 📏"},
      {q:"짧다 = ?", opts:["long","short","tall","thin"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"짧다 (jjalda) = short (length). 짧은 치마 = short skirt. 📐"},
      {q:"빠르다 = ?", opts:["slow","fast","heavy","light"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"빠르다 (ppareuda) = fast. 빨라요! = It's fast! Opposite: 느리다 (slow). 🏎️"},
      {q:"느리다 = ?", opts:["fast","slow","heavy","light"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"느리다 (neurida) = slow. 너무 느려요 = Too slow! 🐢"},
      {q:"무겁다 = ?", opts:["light","heavy","big","small"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"무겁다 (mugeopda) = heavy. 가방이 무거워요 = The bag is heavy! 🎒"},
      {q:"가볍다 = ?", opts:["heavy","light","big","thick"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"가볍다 (gabyeopda) = light (weight). Opposite of 무겁다! 🪶"},
      {q:"새롭다 = ?", opts:["old","new","same","different"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"새롭다 (saeropda) = new. 새 is also 'new': 새 옷 = new clothes! ✨"},
      {q:"같다 = ?", opts:["different","same","similar","opposite"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"같다 (gatda) = same. 우리는 같아요 = We're the same! Opposite: 다르다. 🟰"},
      {q:"다르다 = ?", opts:["same","different","similar","equal"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"다르다 (dareuda) = different. 달라요! = It's different! 🔄"},
      {q:"쉽다 = ?", opts:["difficult","boring","easy","hard"], a:2, ml:161, topic:"TOPIK I · 형용사", exp:"쉽다 (swipda) = easy. 쉬워요! = It's easy! Opposite: 어렵다 (difficult). 😌"},
      {q:"많다 = ?", opts:["few","many/much","all","some"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"많다 (manta) = many/much. 사람이 많아요 = There are many people! 👥"},
      {q:"적다 = ?", opts:["many","few/little","all","none"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"적다 (jeokda) = few/little. Opposite of 많다! 돈이 적어요 = Little money! 💸"},
      {q:"넓다 = ?", opts:["narrow","wide","tall","short"], a:1, ml:161, topic:"TOPIK I · 형용사", exp:"넓다 (neolda) = wide/spacious. 방이 넓어요 = The room is spacious! 🏠"},
      // --- Daily Routine ---
      {q:"일어나다 = ?", opts:["to sleep","to wake up","to eat","to wash"], a:1, ml:351, topic:"TOPIK I · 일상", exp:"일어나다 (ireonada) = to wake up/get up. 아침에 일어나요 = I wake up in the morning! ⏰"},
      {q:"씻다 = ?", opts:["to eat","to sleep","to wash","to dress"], a:2, ml:351, topic:"TOPIK I · 일상", exp:"씻다 (ssitda) = to wash. 얼굴을 씻어요 = I wash my face! 🚿"},
      {q:"출근하다 = ?", opts:["to go home","to go to work","to go to school","to exercise"], a:1, ml:351, topic:"TOPIK I · 일상", exp:"출근하다 (chulgeunhada) = to go to work. 출=out, 근=work. 아침에 출근해요! 🏢"},
      {q:"퇴근하다 = ?", opts:["to go to work","to leave work","to go to school","to exercise"], a:1, ml:351, topic:"TOPIK I · 일상", exp:"퇴근하다 (toegeunhada) = to leave work. 6시에 퇴근해요 = I leave work at 6! 🏠"},
      {q:"아침 means?", opts:["evening","morning","afternoon","night"], a:1, ml:351, topic:"TOPIK I · 일상", exp:"아침 (achim) = morning or breakfast. 아침을 먹었어요? = Did you eat breakfast? 🌅"},
      {q:"점심 means?", opts:["breakfast","lunch","dinner","snack"], a:1, ml:351, topic:"TOPIK I · 일상", exp:"점심 (jeomsim) = lunch. 점심 먹었어요? = Did you eat lunch? 🍱"},
      {q:"저녁 means?", opts:["morning","lunch","evening/dinner","night"], a:2, ml:351, topic:"TOPIK I · 일상", exp:"저녁 (jeonyeok) = evening or dinner. 저녁에 뭐 해요? = What do you do in the evening? 🌆"},
      // --- Sentence Patterns & Grammar Practice ---
      {q:"___에 가요 means?", opts:["come from ___","go to ___","live at ___","work at ___"], a:1, ml:281, topic:"TOPIK I · 문형", exp:"에 가요 = go to. 학교에 가요 = I go to school. 에 marks the destination! 🏫→"},
      {q:"___에서 왔어요:", opts:["I go to ___","I came from ___","I live at ___","I work at ___"], a:1, ml:281, topic:"TOPIK I · 문형", exp:"에서 왔어요 = came from. 한국에서 왔어요 = I came from Korea! 🇰🇷"},
      {q:"___을/를 좋아해요:", opts:["I have ___","I dislike ___","I like ___","I need ___"], a:2, ml:281, topic:"TOPIK I · 문형", exp:"을/를 좋아해요 = I like ___. 한국 음식을 좋아해요 = I like Korean food! ❤️"},
      {q:"같이 means?", opts:["alone","together","separately","quickly"], a:1, ml:421, topic:"TOPIK I · 부사", exp:"같이 (gachi) = together. 같이 가요! = Let's go together! 같이 먹어요! 👫"},
      {q:"혼자 means?", opts:["together","alone","everyone","nobody"], a:1, ml:421, topic:"TOPIK I · 부사", exp:"혼자 (honja) = alone. 혼자 살아요 = I live alone. 혼자서 = by oneself. 🧍"},
      {q:"자주 means?", opts:["rarely","sometimes","often","never"], a:2, ml:421, topic:"TOPIK I · 부사", exp:"자주 (jaju) = often. 자주 와요 = I come often! 🔄"},
      {q:"가끔 means?", opts:["always","never","sometimes","often"], a:2, ml:421, topic:"TOPIK I · 부사", exp:"가끔 (gakkeum) = sometimes. 가끔 영화를 봐요 = I sometimes watch movies. 🎬"},
      {q:"항상 means?", opts:["never","sometimes","often","always"], a:3, ml:421, topic:"TOPIK I · 부사", exp:"항상 (hangsang) = always. 항상 감사합니다 = Thank you always! ♾️"},
      {q:"아직 means?", opts:["already","still/yet","never","before"], a:1, ml:421, topic:"TOPIK I · 부사", exp:"아직 (ajik) = still/yet. 아직 안 먹었어요 = I haven't eaten yet! ⏳"},
      {q:"벌써 means?", opts:["still","yet","already","never"], a:2, ml:421, topic:"TOPIK I · 부사", exp:"벌써 (beolsseo) = already. 벌써?! = Already?! Expresses surprise at speed! ⚡"},
      {q:"너무 means?", opts:["not at all","a little","too much/very","just right"], a:2, ml:421, topic:"TOPIK I · 부사", exp:"너무 (neomu) = too much / very. 너무 비싸요! = Too expensive! 너무 좋아요 = So good! 🔥"},
      {q:"잘 means?", opts:["badly","well","fast","slowly"], a:1, ml:421, topic:"TOPIK I · 부사", exp:"잘 (jal) = well. 잘 먹겠습니다 = I will eat well (said before eating)! 잘 자요 = Sleep well! ⭐"},
      {q:"못 vs 안:", opts:["same meaning","못=cannot, 안=don't","못=don't, 안=cannot","both=cannot"], a:1, ml:421, topic:"TOPIK I · 부정 비교", exp:"못 = cannot (ability). 안 = don't (choice). 못 해요 = can't. 안 해요 = won't/don't! 🚫"},
      // --- Practical Situations ---
      {q:"메뉴 주세요:", opts:["Bill please","Menu please","Water please","Check please"], a:1, ml:351, topic:"TOPIK I · 식당", exp:"메뉴 주세요 = Menu please! Essential restaurant Korean! 📋"},
      {q:"계산해 주세요:", opts:["Menu please","Order please","Bill/check please","More please"], a:2, ml:351, topic:"TOPIK I · 식당", exp:"계산해 주세요 = Bill/check please! 계산 = calculation/payment. 💳"},
      {q:"화장실이 어디예요?", opts:["Where is the exit?","Where is the bathroom?","Where is the menu?","How much?"], a:1, ml:351, topic:"TOPIK I · 일상표현", exp:"화장실이 어디예요? = Where is the bathroom? 화장실 = restroom. Must-know! 🚻"},
      {q:"도와주세요:", opts:["Leave me alone","Thank you","Help me please","Excuse me"], a:2, ml:351, topic:"TOPIK I · 일상표현", exp:"도와주세요 (dowajuseyo) = Help me please! 돕다 = to help. Emergency phrase! 🆘"},
      {q:"천천히 means?", opts:["quickly","slowly","loudly","quietly"], a:1, ml:421, topic:"TOPIK I · 부사", exp:"천천히 (cheoncheonhi) = slowly. 천천히 말해 주세요 = Please speak slowly! 🐢"},
      {q:"다시 means?", opts:["first time","never","again","always"], a:2, ml:421, topic:"TOPIK I · 부사", exp:"다시 (dasi) = again. 다시 한번 말해 주세요 = Please say it one more time! 🔁"},
      {q:"전화번호 means?", opts:["email","address","phone number","name"], a:2, ml:351, topic:"TOPIK I · 일상표현", exp:"전화번호 (jeonhwabeonho) = phone number. 전화=phone, 번호=number. 📱"},
      {q:"이름이 뭐예요?", opts:["How old?","What's your name?","Where from?","What time?"], a:1, ml:281, topic:"TOPIK I · 자기소개", exp:"이름이 뭐예요? = What is your name? 이름 = name. 제 이름은 ___이에요! 📛"},
      {q:"몇 살이에요?", opts:["What's your name?","Where are you from?","How old are you?","What do you do?"], a:2, ml:281, topic:"TOPIK I · 자기소개", exp:"몇 살이에요? = How old are you? 살 = years old (uses native Korean numbers)! 🎂"},
      {q:"어디에서 왔어요?", opts:["Where are you going?","Where are you from?","Where do you live?","Where do you work?"], a:1, ml:281, topic:"TOPIK I · 자기소개", exp:"어디에서 왔어요? = Where are you from? 에서=from, 왔어요=came! 🌍"},
      // --- More Reading/Hangul Practice ---
      {q:"다 = ?", opts:["da","ta","na","ra"], a:0, ml:1, topic:"TOPIK I · 읽기", exp:"ㄷ(d) + ㅏ(a) = 다 (da). 다 also means 'all' or is the dictionary ending of verbs! 📖"},
      {q:"사 = ?", opts:["ja","sa","cha","ka"], a:1, ml:1, topic:"TOPIK I · 읽기", exp:"ㅅ(s) + ㅏ(a) = 사 (sa). 사 also means 'four' (Sino-Korean) and 'to buy'! 📖"},
      {q:"고 = ?", opts:["go","ko","no","do"], a:0, ml:1, topic:"TOPIK I · 읽기", exp:"ㄱ(g) + ㅗ(o) = 고 (go). As a connector: -고 = 'and'. 먹고 = eat and... 📖"},
      {q:"감사 = ?", opts:["gamsa","kamsa","gansa","kamsa"], a:0, ml:1, topic:"TOPIK I · 읽기", exp:"ㄱ+ㅏ+ㅁ = 감 (gam), ㅅ+ㅏ = 사 (sa). 감사 = gratitude/thanks! 🙏"},
      {q:"친구 means?", opts:["family","teacher","friend","student"], a:2, ml:1, topic:"TOPIK I · 읽기", exp:"친구 (chingu) = friend. 친한 = close, 구 = companion. 친구랑 같이! 👫"},
      {q:"약속 means?", opts:["medicine","promise/appointment","key","ticket"], a:1, ml:1, topic:"TOPIK I · 읽기", exp:"약속 (yaksok) = promise or appointment. 약속이 있어요 = I have an appointment! 📅"},
      {q:"선물 means?", opts:["holiday","money","present/gift","card"], a:2, ml:1, topic:"TOPIK I · 읽기", exp:"선물 (seonmul) = present/gift. 생일 선물 = birthday present! 🎁"},
      {q:"행복하다 means?", opts:["sad","angry","lonely","happy"], a:3, ml:161, topic:"TOPIK I · 형용사", exp:"행복하다 (haengbokhada) = happy. 행복해요! = I'm happy! 행복한 생일 = Happy birthday! 🥰"},
    ],

      {q:"-고 connects like:", opts:["but","and","because","if"], a:1, topic:"TOPIK II · 연결어미", exp:"-고 = and (actions). 먹고 마셔요 = eat and drink! ➕"},

      {q:"-(으)면 안 되다:", opts:["may","must not","can","want to"], a:1, topic:"TOPIK II · 금지", exp:"-(으)면 안 되다 = must not. 여기서 담배를 피우면 안 돼요 = No smoking! 🚭"},

      {q:"Honorific of 자다:", opts:["자요","주무세요","잘 자요","자시다"], a:1, topic:"TOPIK II · 존댓말", exp:"자다 → 주무시다 for elders. 안녕히 주무세요 = Sleep well (to elder)! 🛏️"},
      {q:"-(으)세요 is:", opts:["casual","polite request/honorific","written","past"], a:1, topic:"TOPIK II · 존댓말", exp:"-(으)세요 = please do / honorific. 앉으세요 = Please sit! 🙏"},
      {q:"회사 means:", opts:["school","hospital","company","store"], a:2, topic:"TOPIK II · 직장", exp:"회사 = company. 회사원 = office worker. 🏢"},
      {q:"여행 means:", opts:["work","study","travel","exercise"], a:2, topic:"TOPIK II · 여행", exp:"여행 = travel/trip. 여행 가고 싶어요! 🧳"},
      {q:"건강 means:", opts:["money","health","weather","mood"], a:1, topic:"TOPIK II · 건강", exp:"건강 = health. 건강하세요! = Be healthy! 💪"},
      {q:"문화 means:", opts:["question","culture","sentence","door"], a:1, topic:"TOPIK II · 사회", exp:"문화 = culture. 한국 문화 = Korean culture! 🎭"},
      {q:"권 counts:", opts:["people","books/volumes","animals","bottles"], a:1, topic:"TOPIK II · 단위", exp:"권 = books/volumes. 책 세 권 = 3 books! 📚"},
      {q:"병 counts:", opts:["cups","sheets","bottles","pieces"], a:2, topic:"TOPIK II · 단위", exp:"병 = bottles. 물 한 병 = 1 bottle of water! 🍾"},
      {q:"번 counts:", opts:["sheets","times/number","bottles","floors"], a:1, topic:"TOPIK II · 단위", exp:"번 = times/number. 세 번 = 3 times. 🔢"},
      {q:"-아/어 주다 means:", opts:["to try","to do for someone","to finish","to plan"], a:1, topic:"TOPIK II · 문법", exp:"-아/어 주다 = do for someone. 도와주세요 = Please help me! 🤝"},
      {q:"-아/어 보다 means:", opts:["to see","to try doing","to finish","must do"], a:1, topic:"TOPIK II · 문법", exp:"-아/어 보다 = try doing. 먹어 봐요 = Try eating it! 🔍"},
      {q:"-ㄴ/는 것 같다:", opts:["I know","I think/seems","I want","I must"], a:1, topic:"TOPIK II · 문법", exp:"-것 같다 = it seems/I think. 비가 올 것 같아요 = I think it'll rain! 🤔"},
      {q:"-아/어야 하다:", opts:["can","want to","must/have to","try to"], a:2, topic:"TOPIK II · 의무", exp:"-아/어야 하다 = must. 공부해야 해요 = I must study! 📝"},
      {q:"-지 마세요 means:", opts:["please do","please don't","please try","I hope"], a:1, topic:"TOPIK II · 금지", exp:"-지 마세요 = please don't. 걱정하지 마세요 = Don't worry! 🙅"},
      {q:"-기로 하다 means:", opts:["to try","to decide to","to finish","to start"], a:1, topic:"TOPIK II · 결심", exp:"-기로 하다 = decide to. 한국어를 배우기로 했어요! 🎯"},

      {q:"반말 is used with:", opts:["strangers","elders","close friends/younger","bosses"], a:2, topic:"TOPIK II · 격식", exp:"반말 = casual speech for close friends, younger people. 👫"},
      {q:"Reported speech -다고:", opts:["I want","said that","I think","I hope"], a:1, topic:"TOPIK II · 간접화법", exp:"-다고 하다 = said that. 맛있다고 했어요 = Said it's delicious! 💬"},

function getQuestionPool(lvl, subj) {

  const tag = (arr, src) => arr.map((q, i) => ({...q, _id: `${src}_${i}`, _src: src}));

  }
  if (!Q[lvl] || !Q[lvl][subj]) return [];
  return tag(Q[lvl][subj], subj);

  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const r = Math.round(pa[0]+(pb[0]-pa[0])*t), g = Math.round(pa[1]+(pb[1]-pa[1])*t), bl = Math.round(pa[2]+(pb[2]-pa[2])*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
}

// ============== LEVEL SPEC GENERATOR ==============
// Determines what "level N" looks like: path, waves, starting coins, boss or not.
// Design: within a level, all rounds share the same map. The player adds more
// towers between rounds. Maps also repeat across 3 consecutive levels so the
// player masters a layout before a new one appears.
function getLevelSpec(n) {
  const isBoss = n % 10 === 0;
  if (isBoss) {
    // Boss round: blank map, user builds maze — single big wave
    return {
      n, isBoss: true,
      variant: -1,
      entry: {col:0, row:0},
      exit: {col:6, row:7},
      waves: generateBossWaves(n),
      startCoins: Math.min(280, 110 + Math.floor(n/10) * 25),
      lives: 5,
      questionsPerWave: [Math.min(5, 3 + Math.floor(n/50))],
    };
  }
  // Map variant stays the same for 3 consecutive levels (map mastery).
  // Skip the boss slot when cycling so the pattern stays clean.
  const normalIdx = n - Math.floor(n / 10);
  const variantIdx = Math.floor((normalIdx - 1) / 3) % PATH_VARIANTS.length;
  const waves = generateWaves(n);
  const isK2 = state.level === 'K2';
  const tuning = getModeTuning();
  const baseCoins = isK2 ? Math.min(280, 120 + Math.floor(n/3) * 5)
                         : Math.min(220, 90 + Math.floor(n/4) * 4);
  return {
    n, isBoss: false,
    variant: variantIdx,
    path: PATH_VARIANTS[variantIdx],
    waves,
    startCoins: Math.round(baseCoins * tuning.startCoinsMul),
    lives: isK2 ? 7 : (tuning.lives || 5),
    questionsPerWave: waves.map((_, i) => {
      const isLast = i === waves.length - 1;
      if (isK2) return isLast ? 2 : 1;
      const base = Math.min(2, 1 + Math.floor(n / 30)) + tuning.questionsExtra;
      return isLast ? Math.min(5, base + 1) : base;
    }),
  };
}

function generateWaves(n) {
  // Every normal level has 8 rounds on the same map.
  const numWaves = 8;
  const hpBoost = Math.min(50, Math.floor(n / 8));
  const isK2 = state.level === 'K2';
  const waves = [];
  for (let w = 0; w < numWaves; w++) {
    // K2: fewer enemies, gentler scaling, slower spawn
    const baseCount = isK2 ? (2 + Math.floor(n / 25) + Math.floor(w * 0.6))
                           : (3 + Math.floor(n / 15) + w);
    const count = Math.min(isK2 ? 12 : 22, baseCount);
    let pool = [0, 3]; // troll, bat
    if (n >= 2 || w >= 2) pool.push(1);   // goblin
    if (n >= 5 || w >= 3) pool.push(4);   // ghostie
    if (!isK2 && (n >= 10 || w >= 5)) pool.push(2);  // spider
    if (!isK2 && (n >= 15 || w >= 7)) pool.push(5);  // skelly
    const enemies = [];
    for (let i = 0; i < count; i++) {
      enemies.push({
        type: pool[Math.floor(Math.random() * pool.length)],
        delay: Math.max(380, (isK2 ? 1100 : 850) + Math.random() * 350 - Math.min(400, n * 3)),
        hpBoost: isK2 ? Math.floor(hpBoost * 0.5 + w * 0.5) : (hpBoost + Math.floor(w * 1.5)),
      });
    }
    waves.push({ enemies });
  }
  return waves;
}

function generateBossWaves(n) {
  const bossIdx = Math.min(BOSS_TYPES.length - 1, Math.floor(n / 10) - 1);
  const bossHpBoost = Math.floor(n / 10) * 8;
  const minionCount = 6 + Math.floor(n / 10);
  const minions = [];
  for (let i = 0; i < minionCount; i++) {
    minions.push({ type: [0,3,4][i%3], delay: 700, hpBoost: Math.floor(n/8), boss:false });
  }
  const bossEnemy = { boss: true, bossIdx, delay: 1500, hpBoost: bossHpBoost };
  return [{ enemies: [...minions, bossEnemy] }];
}

// ============== PATHFINDING (for boss rounds) ==============
function bfsPath(start, end, isBlocked) {
  const key = (c, r) => `${c},${r}`;
  const q = [{col:start.col, row:start.row}];
  const parent = new Map();
  parent.set(key(start.col, start.row), null);
  while (q.length) {
    const cur = q.shift();
    if (cur.col === end.col && cur.row === end.row) {
      // reconstruct
      const out = [];
      let k = key(cur.col, cur.row);
      while (k) {
        const [c, r] = k.split(',').map(Number);
        out.unshift({col:c, row:r});
        k = parent.get(k);
      }
      return out;
    }
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nc = cur.col + dc, nr = cur.row + dr;
      if (nc<0 || nc>=GRID_COLS || nr<0 || nr>=GRID_ROWS) continue;
      const nk = key(nc, nr);
      if (parent.has(nk)) continue;
      if (isBlocked(nc, nr)) continue;
      parent.set(nk, key(cur.col, cur.row));
      q.push({col:nc, row:nr});
    }
  }
  return null;
}

// ============== PROGRESS (localStorage for persistence) ==============
const progress = {
  data: null,
  _loaded: false,
  async load() {
    if (this._loaded) return;
    this._loaded = true;
    this.data = this._default();
    try {
      const raw = localStorage.getItem('kd_progress_v1');
      if (raw) {
        const parsed = JSON.parse(raw);
        this.data = {...this._default(), ...parsed};
      }
    } catch(e) {}
  },
  async save() {
    try {
      localStorage.setItem('kd_progress_v1', JSON.stringify(this.data));
    } catch(e) {}
  },
  key(lvl, subj) { return `${state.mode}_${lvl}_${subj}`; },
  getUnlocked(lvl, subj) { return (this.data && this.data[this.key(lvl,subj)]?.unlocked) || 1; },
  getStars(lvl, subj, n) { return (this.data && this.data[this.key(lvl,subj)]?.stars?.[n]) || 0; },
  async complete(lvl, subj, n, stars) {
    const k = this.key(lvl, subj);
    if (!this.data[k]) this.data[k] = { unlocked: 1, stars: {} };
    const bucket = this.data[k];
    bucket.unlocked = Math.max(bucket.unlocked, n + 1);
    bucket.stars[n] = Math.max(bucket.stars[n] || 0, stars);
    await this.save();
  },

  // Question history per grade level (P1/P2/P3). Mixed mode questions are
  // tagged with their source subject so history is shared between single-subject
  // and mixed modes — a math question seen in Mixed won't reappear in Math, etc.
  historyKey(lvl) { return `hist_${lvl}`; },
  getHistory(lvl) {
    const k = this.historyKey(lvl);
    if (!this.data[k]) this.data[k] = { seen: [], mistakes: [] };
    return this.data[k];
  },
  isMistake(lvl, qId) {
    return this.getHistory(lvl).mistakes.includes(qId);
  },
  recordAnswer(lvl, qId, correct) {
    const h = this.getHistory(lvl);
    if (!h.seen.includes(qId)) h.seen.push(qId);
    if (correct) {
      h.mistakes = h.mistakes.filter(id => id !== qId);
    } else {
      if (!h.mistakes.includes(qId)) h.mistakes.push(qId);
    }
    this.save();   // fire-and-forget
  },

  _default() { return {}; },
};

// Smart quiz question picker: prefers mistakes (for review), then unseen,
// then falls back to mastered questions only if pool is exhausted.
function pickQuestionsForQuiz(lvl, subj, count) {
  let pool = getQuestionPool(lvl, subj);
  // Staged curriculum: filter by minLevel if questions have ml tags.
  // Only show questions the player has "unlocked" based on their current level.
  const currentLevel = state.levelNum || 1;
  pool = pool.filter(q => !q.ml || q.ml <= currentLevel);

  const h = progress.getHistory(lvl);
  const seenSet = new Set(h.seen);
  const mistakesSet = new Set(h.mistakes);

  const mistakes = [], unseen = [], mastered = [];
  for (const q of pool) {
    if (mistakesSet.has(q._id)) mistakes.push(q);
    else if (seenSet.has(q._id)) mastered.push(q);
    else unseen.push(q);
  }
  const shuffle = arr => { const a = [...arr]; for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };

  const picked = [];
  // Up to half the quiz slots can be review (mistake) questions
  const maxMistakes = Math.ceil(count / 2);
  picked.push(...shuffle(mistakes).slice(0, Math.min(maxMistakes, mistakes.length)));

  // Fill remaining slots with fresh, unseen questions
  const needMore = count - picked.length;
  if (needMore > 0) picked.push(...shuffle(unseen).slice(0, needMore));

  // Still need more? Use extra mistakes (beyond the half-cap)
  const extraMistakesAvailable = mistakes.filter(m => !picked.includes(m));
  const stillNeed1 = count - picked.length;
  if (stillNeed1 > 0) picked.push(...shuffle(extraMistakesAvailable).slice(0, stillNeed1));

  // Last resort: mastered questions (only when the pool is truly exhausted)
  const stillNeed2 = count - picked.length;
  if (stillNeed2 > 0) picked.push(...shuffle(mastered).slice(0, stillNeed2));

  return shuffle(picked);
}

function computeGrid() {

  state.tileSize = Math.floor(Math.min(availW / GRID_COLS, availH / GRID_ROWS));

  state.gridOffX = Math.round((state.canvasW - gW) / 2);

function cellRect(c, r) { return { x: state.gridOffX + c*state.tileSize, y: state.gridOffY + r*state.tileSize, w: state.tileSize, h: state.tileSize }; }
function pxToCell(px, py) {
  const c = Math.floor((px - state.gridOffX) / state.tileSize);
  const r = Math.floor((py - state.gridOffY) / state.tileSize);
