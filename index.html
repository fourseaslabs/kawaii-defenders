    // For boss: entry/exit are "path" cells (can't place tower there)
    const s = state.spec;
    if (c === s.entry.col && r === s.entry.row) return true;
    if (c === s.exit.col && r === s.exit.row) return true;
    return false;
  }
  const cells = state.spec?.path || [];
  return cells.some(([cc, rr]) => cc === c && rr === r);
}

function getPathPoints() {
  const cells = getPathCells().map(cell => {
    if (Array.isArray(cell)) return cellCenter(cell[0], cell[1]);
    return cellCenter(cell.col, cell.row);
  });
  if (cells.length < 2) return cells;
  const ts = state.tileSize;
  // extend start off-left
  const first = cells[0], second = cells[1];
  const dx = first.x - second.x, dy = first.y - second.y;
  const len = Math.hypot(dx, dy) || 1;
  const startExt = { x: first.x + (dx/len) * ts * 1.2, y: first.y + (dy/len) * ts * 1.2 };
  // extend end off-screen
  const last = cells[cells.length-1], prev = cells[cells.length-2];
  const dx2 = last.x - prev.x, dy2 = last.y - prev.y;
  const len2 = Math.hypot(dx2, dy2) || 1;
  const endExt = { x: last.x + (dx2/len2) * ts * 1.2, y: last.y + (dy2/len2) * ts * 1.2 };
  return [startExt, ...cells, endExt];
}

// ============== ENEMIES ==============
function spawnEnemy(spec) {
  let type, isBoss = false;
  if (spec.boss) {
    type = BOSS_TYPES[spec.bossIdx];
    isBoss = true;
  } else {
    type = ENEMY_TYPES[spec.type];
  }
  const pp = getPathPoints();
  state.enemies.push({
    type, hp: type.hp + spec.hpBoost, maxHp: type.hp + spec.hpBoost,
    speed: type.speed, segment: 0, t: 0,
    x: pp[0].x, y: pp[0].y, wobble: Math.random() * Math.PI * 2,
    boss: isBoss,
  });
}

function updateEnemies(dt) {
  const pp = getPathPoints();
  for (let i = state.enemies.length - 1; i >= 0; i--) {
    const e = state.enemies[i];
    e.wobble += dt * 6;
    const a = pp[e.segment];
    const b = pp[e.segment + 1];
    if (!b) {
      const damage = e.boss ? 3 : 1;
      state.lives = Math.max(0, state.lives - damage);
      state.enemies.splice(i, 1);
      updateHUD();
      flashHeart();
      audio.play('heartlost');
      if (state.lives <= 0) { gameOver(false); return; }
      continue;
    }
    const segLen = Math.hypot(b.x - a.x, b.y - a.y) || 1;
    e.t += (e.speed * dt) / segLen;
    while (e.t >= 1 && e.segment < pp.length - 1) { e.t -= 1; e.segment++; }
    const aa = pp[e.segment] || a, bb = pp[e.segment + 1] || b;
    const tt = Math.max(0, Math.min(1, e.t));
    e.x = aa.x + (bb.x - aa.x) * tt;
    e.y = aa.y + (bb.y - aa.y) * tt;
  }
}

// ============== TOWERS ==============
function placeTower(col, row, type) {
  const c = cellCenter(col, row);
  state.towers.push({ type, level: 0, col, row, x: c.x, y: c.y, cooldown: 0 });
}

function updateTowers(dt) {
  for (const t of state.towers) {
    const spec = towerSpec(t.type, t.level);
    t.cooldown -= dt * 1000;
    if (t.cooldown > 0) continue;
    const rangePx = spec.range * state.tileSize;
    let target = null, best = Infinity;
    for (const e of state.enemies) {
      const d = Math.hypot(e.x - t.x, e.y - t.y);
      if (d < rangePx && d < best) { best = d; target = e; }
    }
    if (target) {
      state.projectiles.push({ x: t.x, y: t.y, target, dmg: spec.dmg, t: 0, color: spec.color });
      t.cooldown = spec.fireRate;
      audio.play('shoot');
    }
  }
}

// ============== PROJECTILES ==============
function updateProjectiles(dt) {
  for (let i = state.projectiles.length - 1; i >= 0; i--) {
    const p = state.projectiles[i];
    p.t += dt * 5;
    if (p.t >= 1 || !p.target || !state.enemies.includes(p.target)) {
      if (p.target && state.enemies.includes(p.target)) {
        p.target.hp -= p.dmg;
        spawnSparkles(p.target.x, p.target.y, p.color, 6);
        if (p.target.hp <= 0) {
          audio.play('defeat');
          spawnSparkles(p.target.x, p.target.y, '#FFD66B', p.target.boss ? 28 : 14);
          state.enemies.splice(state.enemies.indexOf(p.target), 1);
        } else {
          audio.play('hit');
        }
      }
      state.projectiles.splice(i, 1);
    }
  }
}

function spawnSparkles(x, y, color, count=6) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 50 + Math.random() * 90;
    state.sparkles.push({
      x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 30,
      life: 0.6 + Math.random()*0.3, max: 0.9, color, size: 3 + Math.random()*3,
    });
  }
}
function updateSparkles(dt) {
  for (let i = state.sparkles.length - 1; i >= 0; i--) {
    const s = state.sparkles[i];
    s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 80 * dt;
    s.life -= dt;
    if (s.life <= 0) state.sparkles.splice(i, 1);
  }
}

// ============== DRAW ==============
function draw() {
  const W = state.canvasW, H = state.canvasH;
  ctx.clearRect(0, 0, W, H);
  const g = ctx.createLinearGradient(0, 60, 0, H - 80);
  g.addColorStop(0, '#EEF7E5'); g.addColorStop(1, '#D8EDDC');
  ctx.fillStyle = g; ctx.fillRect(0, 60, W, H - 140);

  drawGrid();
  drawFlowers();
  drawPath();
  drawBase();
  if (state.selectedTowerType && state.phase === 'prep') drawPlacementHints();
  for (const t of state.towers) drawTower(t);
  for (const e of state.enemies) drawEnemy(e);
  for (const p of state.projectiles) drawProjectile(p);
  for (const s of state.sparkles) drawSparkle(s);
}

function drawGrid() {
  const ts = state.tileSize;
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (isPathCell(c, r)) continue;
      const rect = cellRect(c, r);
      ctx.fillStyle = ((c + r) % 2 === 0) ? '#C8E6B8' : '#BDDFAD';
      ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    }
  }
  ctx.strokeStyle = 'rgba(61,46,63,0.1)'; ctx.lineWidth = 1;
  for (let r = 0; r <= GRID_ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(state.gridOffX, state.gridOffY + r * ts);
    ctx.lineTo(state.gridOffX + GRID_COLS * ts, state.gridOffY + r * ts);
    ctx.stroke();
  }
  for (let c = 0; c <= GRID_COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(state.gridOffX + c * ts, state.gridOffY);
    ctx.lineTo(state.gridOffX + c * ts, state.gridOffY + GRID_ROWS * ts);
    ctx.stroke();
  }
}

function drawPlacementHints() {
  const spec = towerSpec(state.selectedTowerType, 0);
  const canAfford = state.coins >= spec.cost;
  const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 300);
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (isPathCell(c, r)) continue;
      if (towerAt(c, r)) continue;
      // For boss: check if placement would block
      if (state.spec?.isBoss && !canPlaceInBoss(c, r)) continue;
      const rect = cellRect(c, r);
      if (canAfford) {
        ctx.fillStyle = `rgba(255, 214, 107, ${0.15 + 0.25 * pulse})`;
        ctx.fillRect(rect.x + 2, rect.y + 2, rect.w - 4, rect.h - 4);
        ctx.strokeStyle = `rgba(255, 180, 50, ${0.4 + 0.5 * pulse})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(rect.x + 2, rect.y + 2, rect.w - 4, rect.h - 4);
      }
    }
  }
}

function drawFlowers() {
  if (!flowerCache || _flowerSize !== state.tileSize) {
    flowerCache = []; _flowerSize = state.tileSize;
    const emojis = ['🌸','🌼','🌻','🍀','🌷','🌺'];
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        if (isPathCell(c, r)) continue;
        if (Math.random() < 0.24) {
          const rect = cellRect(c, r);
          flowerCache.push({
            col: c, row: r,
            x: rect.x + rect.w / 2 + (Math.random() - 0.5) * rect.w * 0.3,
            y: rect.y + rect.h / 2 + (Math.random() - 0.5) * rect.h * 0.3,
            e: emojis[Math.floor(Math.random() * emojis.length)],
            s: Math.max(12, state.tileSize * 0.32),
          });
        }
      }
    }
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const f of flowerCache) {
    if (towerAt(f.col, f.row)) continue;
    ctx.font = `${f.s}px serif`;
    ctx.globalAlpha = 0.9;
    ctx.fillText(f.e, f.x, f.y);
    ctx.globalAlpha = 1;
  }
}

function drawPath() {
  const pp = getPathPoints();
  if (pp.length < 2) return;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const pathW = state.tileSize * 0.82;
  ctx.strokeStyle = '#8B6F47'; ctx.lineWidth = pathW + 6;
  ctx.beginPath(); ctx.moveTo(pp[0].x, pp[0].y);
  for (let i = 1; i < pp.length; i++) ctx.lineTo(pp[i].x, pp[i].y);
  ctx.stroke();
  ctx.strokeStyle = '#F4D9A6'; ctx.lineWidth = pathW; ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 3;
  ctx.setLineDash([10, 9]);
  ctx.beginPath(); ctx.moveTo(pp[0].x, pp[0].y);
  for (let i = 1; i < pp.length; i++) ctx.lineTo(pp[i].x, pp[i].y);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawBase() {
  const cells = state.spec?.isBoss
    ? { first: state.spec.entry, last: state.spec.exit }
    : { first: {col: state.spec.path[0][0], row: state.spec.path[0][1]},
        last: {col: state.spec.path[state.spec.path.length-1][0], row: state.spec.path[state.spec.path.length-1][1]} };
  const lastC = cellCenter(cells.last.col, cells.last.row);
  drawEmojiCircle(lastC.x, lastC.y, state.tileSize * 0.38, '#FFF4D4', '🏫');
  const firstC = cellCenter(cells.first.col, cells.first.row);
  ctx.font = `${Math.round(state.tileSize * 0.5)}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const ax = firstC.x - (state.spec?.isBoss ? 0 : state.tileSize * 0.7);
  const ay = firstC.y - (state.spec?.isBoss ? state.tileSize * 0.7 : 0);
  ctx.fillText('➡️', ax, ay);
}

function drawTower(t) {
  const spec = towerSpec(t.type, t.level);
  const r = state.tileSize * 0.35;
  if (state.phase === 'prep') {
    ctx.beginPath(); ctx.arc(t.x, t.y, spec.range * state.tileSize, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = 'rgba(61,46,63,0.14)'; ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
  }
  // Upgrade ring (visible from L4+, gold from L8+)
  if (spec.ring) {
    ctx.beginPath(); ctx.arc(t.x, t.y, r + 3, 0, Math.PI * 2);
    ctx.strokeStyle = spec.ring; ctx.lineWidth = 3; ctx.stroke();
  }
  drawEmojiCircle(t.x, t.y, r, spec.color, spec.emoji);
  // Crown for max level (L10)
  if (spec.crown) {
    ctx.font = `${Math.round(r * 0.75)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('👑', t.x, t.y - r - 2);
  }
  // Level badge — small number below the tower
  if (t.level > 0) {
    const fs = Math.max(9, Math.round(state.tileSize * 0.2));
    ctx.font = `bold ${fs}px Fredoka, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = spec.ring || '#6B4FA0';
    ctx.fillText(`Lv${t.level + 1}`, t.x, t.y + r + 2);
  }
}

function drawEnemy(e) {
  const bob = Math.sin(e.wobble) * 2;
  const r = state.tileSize * (e.boss ? 0.42 : 0.28);
  drawEmojiCircle(e.x, e.y + bob, r, e.boss ? '#FFD6D6' : 'white', e.type.emoji);
  if (e.hp < e.maxHp) {
    const w = r * 2;
    ctx.fillStyle = '#FFF';
    ctx.fillRect(e.x - w/2, e.y - r - 10, w, 5);
    ctx.fillStyle = e.boss ? '#D14D6A' : '#4ABE86';
    ctx.fillRect(e.x - w/2, e.y - r - 10, w * (e.hp/e.maxHp), 5);
    ctx.strokeStyle = 'rgba(61,46,63,0.6)'; ctx.lineWidth = 1;
    ctx.strokeRect(e.x - w/2, e.y - r - 10, w, 5);
  }
}

function drawEmojiCircle(x, y, r, bg, emoji) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = '#3D2E3F'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.font = `${Math.round(r * 1.3)}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x, y + 1);
}

function drawProjectile(p) {
  const tx = p.target ? p.target.x : p.x, ty = p.target ? p.target.y : p.y;
  const x = p.x + (tx - p.x) * p.t, y = p.y + (ty - p.y) * p.t;
  for (let i = 0; i < 3; i++) {
    const tt = Math.max(0, p.t - i * 0.08);
    const px = p.x + (tx - p.x) * tt, py = p.y + (ty - p.y) * tt;
    ctx.beginPath(); ctx.arc(px, py, 5 - i * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.globalAlpha = 1 - i * 0.3; ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = p.color; ctx.fill();
  ctx.strokeStyle = '#3D2E3F'; ctx.lineWidth = 1.5; ctx.stroke();
}

function drawSparkle(s) {
  const alpha = Math.max(0, s.life / s.max);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = s.color;
  ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

// ============== BOSS MAZE VALIDATION ==============
function canPlaceInBoss(col, row) {
  if (!state.spec?.isBoss) return true;
  const s = state.spec;
  if (col === s.entry.col && row === s.entry.row) return false;
  if (col === s.exit.col && row === s.exit.row) return false;
  const blocked = (c, r) => {
    if (c === col && r === row) return true;
    return !!towerAt(c, r);
  };
  const path = bfsPath(s.entry, s.exit, blocked);
  return path !== null;
}

function recomputeBossPath() {
  if (!state.spec?.isBoss) return;
  const s = state.spec;
  const blocked = (c, r) => !!towerAt(c, r);
  const p = bfsPath(s.entry, s.exit, blocked);
  state.bossPath = p || [s.entry, s.exit];
}

// ============== INTERACTION ==============
function onCanvasPointer(e) {
  if (state.phase !== 'prep' && state.phase !== 'wave') return;
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const cell = pxToCell(cx, cy);
  if (!cell) return;

  // Check if tapping an existing tower → open upgrade popup (during prep only)
  const existing = towerAt(cell.col, cell.row);
  if (existing && state.phase === 'prep') {
    audio.play('click');
    openTowerPopup(existing);
    return;
  }

  // Place new tower (prep only)
  if (state.phase !== 'prep') return;
  if (!state.selectedTowerType) { audio.play('invalid'); flashHint('Pick a tower below first! 👇'); return; }
  if (isPathCell(cell.col, cell.row)) { audio.play('invalid'); flashHint('Not on the path! 🚧'); return; }
  if (existing) { audio.play('invalid'); flashHint('Already has a tower!'); return; }
  if (state.spec?.isBoss && !canPlaceInBoss(cell.col, cell.row)) {
    audio.play('invalid'); flashHint('Would block the monsters! Keep a path open.'); return;
  }
  const spec = towerSpec(state.selectedTowerType, 0);
  if (state.coins < spec.cost) { audio.play('invalid'); flashHint('Not enough coins! 💰'); return; }
  state.coins -= spec.cost;
  placeTower(cell.col, cell.row, state.selectedTowerType);
  if (state.spec?.isBoss) recomputeBossPath();
  audio.play('place');
  const c = cellCenter(cell.col, cell.row);
  spawnSparkles(c.x, c.y, spec.color, 10);
  updateHUD();
  if (state.coins < spec.cost) state.selectedTowerType = null;
  updateTowerBar();
}
canvas.addEventListener('click', onCanvasPointer);

// ============== TOWER UPGRADE POPUP ==============
function openTowerPopup(tower) {
  const popup = document.getElementById('towerPopup');
  popup.style.display = 'flex';
  const spec = TOWERS[tower.type];
  const current = spec.levels[tower.level];
  const next = spec.levels[tower.level + 1];
  const maxLvl = spec.levels.length;
  const refund = Math.floor(totalTowerValue(tower) * 0.6);
  const isMax = tower.level >= maxLvl - 1;

  // Build stat comparison strings
  const statRow = (label, cur, nxt, unit='') => {
    if (!next) return `<div class="tower-stat">${label} <b>${cur}${unit}</b></div>`;
    return `<div class="tower-stat">${label} <b>${cur}${unit}</b> → <b style="color:#2B9B63;">${nxt}${unit}</b></div>`;
  };

  popup.innerHTML = `
    <div class="tower-card">
      <div class="tower-emoji">${isMax ? '👑' : ''}${current.emoji}</div>
      <div class="tower-name">${spec.name}</div>
      <div class="tower-lvl">Level ${tower.level + 1} / ${maxLvl}</div>
      <div style="background:var(--cream);border:2px solid var(--ink);border-radius:10px;padding:6px 10px;margin:8px 0 12px;">
        ${statRow('⚔️ DMG', current.dmg, next?.dmg)}
        ${statRow('🎯 RANGE', current.range, next?.range)}
        ${statRow('⚡ SPEED', (1000/current.fireRate).toFixed(1), next ? (1000/next.fireRate).toFixed(1) : null, '/s')}
      </div>
      <div class="tower-btns">
        ${next ? `
          <button class="tower-btn upgrade ${state.coins < next.cost ? 'disabled' : ''}" id="upgradeBtn">
            <span>⬆️ Upgrade → Lv${tower.level + 2}</span>
            <span>💰 ${next.cost}</span>
          </button>` :
          `<button class="tower-btn upgrade disabled"><span>⭐ MAX LEVEL!</span><span>—</span></button>`
        }
        <button class="tower-btn sell" id="sellBtn">
          <span>💔 Sell Tower</span>
          <span>+💰 ${refund}</span>
        </button>
        <button class="tower-btn close" id="closePopupBtn">Cancel</button>
      </div>
    </div>
  `;
  if (next) {
    document.getElementById('upgradeBtn').addEventListener('click', () => {
      if (state.coins < next.cost) { audio.play('invalid'); return; }
      state.coins -= next.cost;
      tower.level++;
      audio.play('upgrade');
      spawnSparkles(tower.x, tower.y, '#FFD66B', 16);
      updateHUD();
      closeTowerPopup();
    });
  }
  document.getElementById('sellBtn').addEventListener('click', () => {
    state.coins += refund;
    audio.play('sell');
    spawnSparkles(tower.x, tower.y, '#C7B8EA', 10);
    state.towers.splice(state.towers.indexOf(tower), 1);
    if (state.spec?.isBoss) recomputeBossPath();
    updateHUD();
    closeTowerPopup();
  });
  document.getElementById('closePopupBtn').addEventListener('click', () => {
    audio.play('click'); closeTowerPopup();
  });
  popup.addEventListener('click', (ev) => { if (ev.target === popup) closeTowerPopup(); }, { once:true });
}
function closeTowerPopup() {
  const popup = document.getElementById('towerPopup');
  popup.style.display = 'none';
  popup.innerHTML = '';
}
function totalTowerValue(tower) {
  const levels = TOWERS[tower.type].levels;
  let total = 0;
  for (let i = 0; i <= tower.level; i++) total += levels[i].cost;
  return total;
}

// ============== UI ==============
function updateHUD() {
  document.getElementById('livesTxt').textContent = state.lives;
  document.getElementById('coinsTxt').textContent = state.coins;
  document.getElementById('levelTxt').textContent = state.level;
  document.getElementById('levelNumTxt').textContent = state.levelNum + (state.spec?.isBoss ? ' 👹' : '');
  updateTowerBar();
}
function flashHeart() {
  const pill = document.querySelector('.hud-pill.lives');
  if (!pill) return;
  pill.style.animation = 'shake 0.4s';
  setTimeout(() => { pill.style.animation = ''; }, 400);
}
function buildTowerBar() {
  const bar = document.getElementById('towerBar');
  bar.innerHTML = '';
  for (const key of Object.keys(TOWERS)) {
    const spec = towerSpec(key, 0);
    const chip = document.createElement('div');
    chip.className = 'tower-chip'; chip.dataset.key = key;
    chip.innerHTML = `<span class="emoji">${spec.emoji}</span><div class="cost">💰${spec.cost}</div>`;
    chip.addEventListener('click', () => {
      if (state.phase !== 'prep') { audio.play('invalid'); flashHint('Prep phase only!'); return; }
      if (state.coins < spec.cost) { audio.play('invalid'); flashHint(`Need ${spec.cost} coins!`); return; }
      audio.play('select');
      state.selectedTowerType = (state.selectedTowerType === key) ? null : key;
      updateTowerBar();
      if (state.selectedTowerType) flashHint(`Tap a glowing tile to place!`);
    });
    bar.appendChild(chip);
  }
}
function updateTowerBar() {
  document.querySelectorAll('.tower-chip').forEach(chip => {
    const key = chip.dataset.key;
    const spec = towerSpec(key, 0);
    const disabled = state.coins < spec.cost || state.phase !== 'prep';
    chip.classList.toggle('selected', state.selectedTowerType === key);
    chip.classList.toggle('disabled', disabled);
  });
}
let hintTimer = null;
function flashHint(txt) {
  const el = document.getElementById('hint');
  el.textContent = txt; el.style.display = 'block';
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'slideDown 0.3s ease';
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => { el.style.display = 'none'; }, 2200);
}
function setPhaseBanner(text, color) {
  const b = document.getElementById('phaseBanner');
  if (!text) { b.style.display = 'none'; return; }
  b.textContent = text; b.style.display = 'block';
  b.style.background = color || 'var(--ink)';
}

// ============== PHASES ==============
function enterPrepPhase() {
  state.phase = 'prep';
  const totalRounds = state.spec.waves.length;
  const roundNum = state.currentWaveIdx + 1;
  const label = state.spec.isBoss
    ? '👹 BOSS · Build your maze!'
    : (state.currentWaveIdx === 0
        ? `🧱 PREP · Round 1 of ${totalRounds}`
        : `🧱 PREP · Round ${roundNum} of ${totalRounds} · More towers?`);
  setPhaseBanner(label, state.spec.isBoss ? '#D14D6A' : 'var(--ink)');
  document.getElementById('sendWaveBtn').classList.remove('hidden');
  state.selectedTowerType = null;
  updateTowerBar();
  audio.setTempo(1.0);
  if (state.spec.isBoss && state.currentWaveIdx === 0) {
    flashHint('Build a maze — enemies must still reach the exit! 🌀');
  } else if (state.currentWaveIdx === 0) {
    flashHint(`This map has ${totalRounds} rounds. Place towers, then SEND WAVE!`);
  } else {
    flashHint(`Round ${roundNum} coming! Add more towers or upgrade existing ones.`);
  }
}
function startWave() {
  state.phase = 'wave';
  const totalRounds = state.spec.waves.length;
  const roundNum = state.currentWaveIdx + 1;
  setPhaseBanner(`🛡️ ROUND ${roundNum}/${totalRounds} · Defend!`, '#D14D6A');
  document.getElementById('sendWaveBtn').classList.add('hidden');
  state.selectedTowerType = null;
  updateTowerBar();
  audio.play(state.spec.isBoss ? 'boss' : 'wave');
  audio.setTempo(1.25);
  const wave = state.spec.waves[state.currentWaveIdx];
  state.spawnQueue = wave.enemies.map(e => ({...e, delay: Math.max(400, e.delay || 900)}));
  state.spawnTimer = 0;
}
function updateSpawns(dt) {
  if (state.spawnQueue.length === 0) return;
  state.spawnTimer += dt * 1000;
  const next = state.spawnQueue[0];
  if (state.spawnTimer >= next.delay) {
    spawnEnemy(next);
    state.spawnQueue.shift();
    state.spawnTimer = 0;
  }
}
function checkWaveEnd() {
  if (state.phase !== 'wave') return;
  if (state.spawnQueue.length === 0 && state.enemies.length === 0) {
    // Wave cleared → study phase → quiz
    startStudyPhase();
  }
}

// ============== STUDY PHASE (Option A: learn before being tested) ==============
function startStudyPhase() {
  state.phase = 'quiz'; // block further wave updates
  setPhaseBanner('📖 STUDY TIME', '#2B9B63');
  document.getElementById('sendWaveBtn').classList.add('hidden');
  audio.setTempo(0.85);

  // Pick the questions that will be in the upcoming quiz
  const count = state.spec.questionsPerWave[state.currentWaveIdx] || 3;
  const upcoming = pickQuestionsForQuiz(state.level, state.subject, count);
  state.quizQuestions = upcoming;

  // Filter to only unseen questions (skip study for review/mastered questions)
  const h = progress.getHistory(state.level);
  const seenSet = new Set(h.seen);
  const unseenCards = upcoming.filter(q => q._id && !seenSet.has(q._id));

  if (unseenCards.length === 0) {
    // All questions are review — skip straight to quiz
    launchQuiz();
    return;
  }

  // Show study cards for unseen questions
  audio.play('quiz');
  showStudyCards(unseenCards, () => launchQuiz());
}

function showStudyCards(cards, onDone) {
  const overlay = document.getElementById('quizOverlay');
  overlay.style.display = 'flex';
  let idx = 0;

  function renderCard() {
    const card = cards[idx];
    const icons = ['📚','💡','🧠','✨','🎓','🌟','📖','🔑'];
    const isKorean = state.mode === 'adults' && state.subject === 'korean';
    const stage = isKorean ? getKoreanStage(state.levelNum) : null;
    overlay.className = 'study-overlay';
    overlay.innerHTML = `
      <div class="study-banner">📖 Study Time!</div>
      <div class="study-sub">${stage ? stage.name : 'Learn before the quiz'}</div>
      <div class="study-progress" id="studyPips"></div>
      <div class="study-card">
        <div class="study-icon">${icons[idx % icons.length]}</div>
        <div class="study-q">${card.q}</div>
        <div class="study-answer">→ ${card.opts[card.a]}</div>
        ${card.exp ? `<div class="study-exp">${card.exp}</div>` : ''}
        ${card.topic ? `<div class="study-source">📖 ${card.topic}</div>` : ''}
      </div>
      <button class="start-btn" id="studyNextBtn">${idx < cards.length - 1 ? 'GOT IT! ✨' : 'START QUIZ 🎓'}</button>
    `;
    // Pips
    const pips = document.getElementById('studyPips');
    for (let i = 0; i < cards.length; i++) {
      const pip = document.createElement('div');
      pip.className = 'study-pip' + (i < idx ? ' done' : (i === idx ? ' active' : ''));
      pips.appendChild(pip);
    }
    document.getElementById('studyNextBtn').addEventListener('click', () => {
      audio.play('click');
      idx++;
      if (idx >= cards.length) {
        overlay.className = 'quiz-overlay';
        overlay.style.display = 'none';
        overlay.innerHTML = '';
        onDone();
      } else {
        renderCard();
      }
    });
  }
  renderCard();
}

// ============== QUIZ ==============
const COIN_PER_CORRECT = 15;
const PERFECT_BONUS = 30;

function launchQuiz() {
  // state.quizQuestions already set by startStudyPhase
  state.quizIndex = 0;
  state.quizCorrect = 0;
  state.quizResults = [];
  setPhaseBanner('🎓 QUIZ ROUND', '#6B4FA0');
  audio.play('quiz');
  renderQuizQuestion();
}
function renderQuizQuestion() {
  const overlay = document.getElementById('quizOverlay');
  overlay.style.display = 'flex';
  const q = state.quizQuestions[state.quizIndex];
  const total = state.quizQuestions.length;
  const idx = state.quizIndex;
  const emojis = ['🐰','🐻','🚓','🚗','👸','🐼','🦄','🦉'];
  const towerEmoji = emojis[idx % emojis.length];
  const totalRounds = state.spec.waves.length;
  const roundNum = state.currentWaveIdx + 1;
  // Show review badge if this question is in the user's mistakes pile
  const isReview = q._id && progress.isMistake(state.level, q._id);
  overlay.innerHTML = `
    <div class="quiz-banner">🎓 Round ${roundNum}/${totalRounds} Quiz</div>
    <div class="quiz-progress">Question ${idx+1} of ${total}</div>
    <div class="quiz-dots" id="quizDots"></div>
    <div class="question-card">
      ${isReview ? '<div class="q-review">🔁 REVIEW · You missed this one before!</div>' : ''}
      <div class="q-tower">${towerEmoji}</div>
      <div class="q-subject">${state.level} · ${getSubjectLabel(state.subject)}</div>
      ${q.topic ? `<div class="q-source">📖 ${q.topic}</div>` : ''}
      <div class="q-text">${q.q}</div>
      ${(isReview && q.exp) ? `<button class="hint-btn" id="hintBtn">💡 Show Hint</button><div class="hint-reveal" id="hintReveal" style="display:none;">💡 ${q.exp}</div>` : ''}
      <div class="q-options">
        ${q.opts.map((o,i) => `<button class="q-option" data-i="${i}">${o}</button>`).join('')}
      </div>
    </div>
  `;
  const dotsEl = document.getElementById('quizDots');
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'quiz-dot';
    if (i < state.quizResults.length) dot.classList.add(state.quizResults[i] ? 'done' : 'wrong');
    else if (i === state.quizIndex) dot.classList.add('current');
    dotsEl.appendChild(dot);
  }
  // Hint button for review questions
  const hintBtn = document.getElementById('hintBtn');
  if (hintBtn) {
    hintBtn.addEventListener('click', () => {
      audio.play('click');
      hintBtn.style.display = 'none';
      document.getElementById('hintReveal').style.display = 'block';
    });
  }
  overlay.querySelectorAll('.q-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      overlay.querySelectorAll('.q-option').forEach(b => b.style.pointerEvents = 'none');
      const correct = i === q.a;
      state.quizResults.push(correct);
      state.totalAnswered++;
      // Record in history for smart picker — won't be re-asked unless they got it wrong
      if (q._id) progress.recordAnswer(state.level, q._id, correct);
      if (correct) {
        btn.classList.add('correct');
        audio.play('correct');
        state.quizCorrect++;
        state.totalCorrect++;
      } else {
        btn.classList.add('wrong');
        audio.play('wrong');
        const cb = overlay.querySelector(`.q-option[data-i="${q.a}"]`);
        if (cb) cb.classList.add('correct');
        // Show the correct answer + explanation so the user learns
        const reveal = document.createElement('div');
        reveal.className = 'correct-reveal';
        reveal.innerHTML = `✅ Correct answer: <b>${q.opts[q.a]}</b>${q.exp ? `<span class="exp-text">💡 ${q.exp}</span>` : ''}`;
        const card = overlay.querySelector('.question-card');
        if (card) card.appendChild(reveal);
      }
      setTimeout(() => {
        state.quizIndex++;
        if (state.quizIndex >= state.quizQuestions.length) showQuizSummary();
        else renderQuizQuestion();
      }, correct ? 650 : 2000);
    });
  });
}
function showQuizSummary() {
  const overlay = document.getElementById('quizOverlay');
  const total = state.quizQuestions.length;
  const correct = state.quizCorrect;
  const coinsEarned = correct * COIN_PER_CORRECT;
  const perfect = correct === total;
  const bonus = perfect ? PERFECT_BONUS : 0;
  state.coins += coinsEarned + bonus;
  updateHUD();
  if (perfect) audio.play('perfect');
  const emoji = perfect ? '🌟' : (correct >= Math.ceil(total * 0.6) ? '🎉' : '💪');
  const title = perfect ? 'PERFECT!' : (correct >= Math.ceil(total * 0.6) ? 'Well Done!' : 'Keep trying!');
  const isLastWave = state.currentWaveIdx >= state.spec.waves.length - 1;
  const totalRounds = state.spec.waves.length;
  const nextRoundNum = state.currentWaveIdx + 2;
  overlay.innerHTML = `
    <div class="summary-big">${emoji}</div>
    <div class="summary-title">${title}</div>
    <div class="summary-stats">You got <b>${correct} / ${total}</b> correct!</div>
    <div class="reward-line">+${coinsEarned}💰 from answers</div>
    ${bonus > 0 ? `<div class="bonus-line">✨ +${bonus}💰 PERFECT BONUS! ✨</div>` : '<div style="height:14px;"></div>'}
    ${!isLastWave ? `<div style="font-family:'Fredoka',sans-serif;font-size:13px;color:#6B4FA0;margin-bottom:10px;font-weight:600;">💡 Spend coins on more towers or upgrades before Round ${nextRoundNum}!</div>` : ''}
    <button class="start-btn" id="continueBtn">${isLastWave ? 'FINISH LEVEL 🏆' : `ROUND ${nextRoundNum}/${totalRounds} ▶️`}</button>
  `;
  document.getElementById('continueBtn').addEventListener('click', () => {
    audio.play('click');
    overlay.style.display = 'none'; overlay.innerHTML = '';
    if (isLastWave) {
      gameOver(true);
    } else {
      state.currentWaveIdx++;
      updateHUD();
      enterPrepPhase();
    }
  });
}

// ============== LOOP ==============
let lastT = 0;
function loop(now) {
  if (!state.running) return;
  const dt = Math.min(0.05, (now - lastT) / 1000 || 0);
  lastT = now;
  if (state.phase === 'wave') {
    updateSpawns(dt);
    updateEnemies(dt);
    updateTowers(dt);
    updateProjectiles(dt);
    checkWaveEnd();
  }
  updateSparkles(dt);
  draw();
  requestAnimationFrame(loop);
}

// ============== START / END LEVEL ==============
function startLevel(levelNum) {
  state.levelNum = levelNum;
  state.spec = getLevelSpec(levelNum);
  state.lives = state.spec.lives;
  state.coins = state.spec.startCoins;
  state.currentWaveIdx = 0;
  state.enemies = []; state.towers = []; state.projectiles = [];
  state.sparkles = []; state.spawnQueue = [];
  state.running = true;
  state.selectedTowerType = null;
  state.totalCorrect = 0; state.totalAnswered = 0;
  state.bossPath = null;

  if (state.spec.isBoss) recomputeBossPath();
  flowerCache = null; // regenerate flowers for new layout

  audio.init(); audio.resume();
  audio.startMusic();

  showGameplayUI();
  updateHUD();
  buildTowerBar();

  // Show intro modal
  showLevelStartModal(() => {
    enterPrepPhase();
    lastT = performance.now();
    requestAnimationFrame(loop);
  });
}

// Korean curriculum stage labels based on level number
function getKoreanStage(n) {
  if (n <= 30) return {name:'Stage 1: Hangul', desc:'Learn to read the Korean alphabet', emoji:'🔤'};
  if (n <= 60) return {name:'Stage 2: Greetings', desc:'Survival phrases & basic expressions', emoji:'👋'};
  if (n <= 100) return {name:'Stage 3: Numbers & Time', desc:'Counting, telling time, days & dates', emoji:'🔢'};
  if (n <= 160) return {name:'Stage 4: Vocabulary', desc:'Family, food, body, colors, places', emoji:'📖'};
  if (n <= 220) return {name:'Stage 5: Verbs & Adjectives', desc:'Action words & descriptions', emoji:'🏃'};
  if (n <= 280) return {name:'Stage 6: Particles', desc:'How Korean glues words together', emoji:'🧩'};
  if (n <= 350) return {name:'Stage 7: Sentences', desc:'Building real Korean sentences', emoji:'💬'};
  if (n <= 420) return {name:'Stage 8: Real Life', desc:'Shopping, transport, restaurants, jobs', emoji:'🌍'};
  return {name:'Stage 9: Grammar', desc:'Tense, adverbs, conjugation — TOPIK I ready!', emoji:'🎓'};
}

  modal.style.display = 'flex';
  const s = state.spec;
  const mapNames = ['Zigzag Valley', 'Curvy Creek', 'Spiral Hills', 'Cross Meadow', 'Wavy Woods'];

  const stage = isKorean ? getKoreanStage(s.n) : null;
  modal.innerHTML = `
    <div class="level-start-card">
      <span class="mascot">${s.isBoss ? '👹' : (stage ? stage.emoji : '🌸')}</span>
      <h2>${s.isBoss ? 'BOSS BATTLE' : `Level ${s.n}`}</h2>
      <div class="type">${state.level === 'beginner' ? '초급 (TOPIK I)' : state.level} · ${getSubjectLabel(state.subject)} · ${mapLabel}</div>
      ${stage ? `<div style="font-family:'Fredoka',sans-serif;font-size:14px;color:#6B4FA0;font-weight:700;margin:6px 0;">${stage.name}</div><div style="font-family:'Fredoka',sans-serif;font-size:12px;color:#7A6A7C;margin-bottom:8px;">${stage.desc}</div>` : ''}
      <div class="info">
        ${s.isBoss
          ? `Build a maze of towers to slow the monsters!<br>You <b>can't fully block</b> the path.<br>🌊 ${s.waves.length} round · 💰${s.startCoins} · ❤️${s.lives}`
          : `<b>${s.waves.length} rounds</b> on this map — add more towers between each round!<br>💰${s.startCoins} to start · ❤️${s.lives} lives`
        }
      </div>
      <button class="start-btn" id="beginBtn">LET'S GO ✨</button>
    </div>
  `;
  document.getElementById('beginBtn').addEventListener('click', () => {

async function gameOver(win) {
  state.phase = 'end';
  state.running = false;
  setPhaseBanner(null);
  document.getElementById('sendWaveBtn').classList.add('hidden');
  audio.stopMusic();
  audio.play(win ? 'victory' : 'defeat_game');

  // Calculate stars (0-3) based on lives remaining + quiz accuracy
  let stars = 0;
  if (win) {
    stars = 1;
    const acc = state.totalAnswered ? state.totalCorrect / state.totalAnswered : 1;
    if (acc >= 0.6 && state.lives >= 3) stars = 2;
    if (acc >= 0.9 && state.lives >= 4) stars = 3;
    await progress.complete(state.level, state.subject, state.levelNum, stars);
  }

  const modal = document.getElementById('levelStartModal');
  modal.style.display = 'flex';
  const acc = state.totalAnswered ? Math.round((state.totalCorrect / state.totalAnswered) * 100) : 0;
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  const nextN = state.levelNum + 1;
  const canContinue = win && nextN <= 500;
  modal.innerHTML = `
    <div class="level-start-card">
      <span class="mascot">${win ? '🏆' : '😿'}</span>
      <h2>${win ? 'Level Complete!' : 'Oh No!'}</h2>
      <div class="type">${state.level} · ${getSubjectLabel(state.subject)} · Level ${state.levelNum}</div>
      <div class="info">
        ${win ? `<div style="font-size:28px; margin:4px 0 8px;">${starStr}</div>` : ''}
        Quiz: ${state.totalCorrect}/${state.totalAnswered} (${acc}%)<br>
        ${win ? `Coins: 💰${state.coins}` : `Reached round ${state.currentWaveIdx + 1}`}
      </div>
      <div style="display:flex; flex-direction:column; gap:10px; align-items:stretch;">
        <button class="start-btn" id="completeBtn">${win ? 'COMPLETE ✓' : 'BACK TO MAP 🗺️'}</button>
        ${canContinue ? `<button class="secondary-btn" id="nextLevelBtn">Play Level ${nextN} ▶️</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('completeBtn').addEventListener('click', async () => {
    audio.play('click');
    modal.style.display = 'none'; modal.innerHTML = '';
    hideGameplayUI();
    await showJourneyScreen();
  });
  if (canContinue) {
    document.getElementById('nextLevelBtn').addEventListener('click', () => {
      audio.play('click');
      modal.style.display = 'none'; modal.innerHTML = '';
      startLevel(nextN);
    });
  }
}

// ============== SCREENS ==============
function hideGameplayUI() {
  document.getElementById('hud').style.display = 'none';
  document.getElementById('towerBar').style.display = 'none';
  document.getElementById('soundControls').style.display = 'none';
  setPhaseBanner(null);
}
function showGameplayUI() {
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('towerBar').style.display = 'flex';
  document.getElementById('soundControls').style.display = 'flex';

async function showJourneyScreen() {
  state.screen = 'journey';
  hideGameplayUI();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('journeyScreen').classList.remove('hidden');
  await progress.load();
  const unlocked = progress.getUnlocked(state.level, state.subject);
  const isKorean = state.mode === 'adults' && state.subject === 'korean';
  const lvlLabel = state.mode === 'adults'
    ? {beginner:'초급 (TOPIK I)',intermediate:'중급 (TOPIK II)',advanced:'고급 (TOPIK II)',native:'원어민'}[state.level] || state.level
    : state.level;
  document.getElementById('journeyTitle').textContent = `${lvlLabel} · ${getSubjectLabel(state.subject)}`;
  const stage = isKorean ? getKoreanStage(unlocked) : null;
  document.getElementById('journeySub').textContent = stage
    ? `Level ${unlocked} · ${stage.name}`
    : `Level ${unlocked} of 500 · 50 boss battles`;
  renderJourneyMap(unlocked);
  // scroll to current level
  setTimeout(() => {
    const cur = document.querySelector('.journey-node.current');
    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 50);
}

function renderJourneyMap(unlocked) {
  const container = document.getElementById('journeyMap');
  container.innerHTML = '';

  const total = 500;
  const showUpTo = Math.min(total, Math.max(40, unlocked + 20));

  // Layout: sine-wave path
  const width = 300;
  const centerX = width / 2;
  const amplitude = 95;
  const spacing = 92;
  const topPad = 50;
  const bottomPad = 40;
  const totalHeight = topPad + bottomPad + (showUpTo - 1) * spacing;

  container.style.width = width + 'px';
  container.style.height = totalHeight + 'px';

  // Compute positions
  const positions = [];
  for (let i = 0; i < showUpTo; i++) {
    const n = i + 1;
    const y = topPad + i * spacing;
    const x = centerX + Math.sin(i * 0.58) * amplitude;
    positions.push({ n, x, y });
  }

  // SVG dashed path connecting consecutive nodes
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class', 'journey-svg');
  svg.setAttribute('viewBox', `0 0 ${width} ${totalHeight}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  for (let i = 0; i < positions.length - 1; i++) {
    const a = positions[i], b = positions[i + 1];
    const path = document.createElementNS(svgNS, 'path');
    const cy = (a.y + b.y) / 2;
    const d = `M ${a.x} ${a.y} C ${a.x} ${cy}, ${b.x} ${cy}, ${b.x} ${b.y}`;
    path.setAttribute('d', d);
    path.setAttribute('stroke', a.n <= unlocked ? '#C7B8EA' : 'rgba(199,184,234,0.3)');
    path.setAttribute('stroke-width', '6');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-dasharray', '7 8');
    path.setAttribute('fill', 'none');
    svg.appendChild(path);
  }
  container.appendChild(svg);

  // Checkpoint banners every 25 levels (between 24 and 25, etc.)
  for (let cp = 25; cp <= showUpTo; cp += 25) {
    const cpY = topPad + (cp - 1) * spacing - spacing / 2;
    const banner = document.createElement('div');
    banner.className = 'journey-checkpoint';
    banner.textContent = `⸺ LEVEL ${cp} ⸺`;
    banner.style.top = cpY + 'px';
    container.appendChild(banner);
  }

  // Nodes
  for (const pos of positions) {
    const n = pos.n;
    const isBoss = n % 10 === 0;
    const isLocked = n > unlocked;
    const isCurrent = n === unlocked;
    const stars = progress.getStars(state.level, state.subject, n);

    const node = document.createElement('div');
    node.className = 'journey-node';
    if (isBoss) node.classList.add('boss');
    if (isLocked) node.classList.add('locked');
    else if (isCurrent) node.classList.add('current');
    else node.classList.add('completed');

    node.style.left = pos.x + 'px';
    node.style.top = pos.y + 'px';

    // Always show the level number
    let html = `<span class="n-num">${n}</span>`;

    // Stars (only if level completed with stars)
    if (!isLocked && !isCurrent && stars >= 0) {
      const showStars = stars > 0;
      if (showStars) {
        html += `<span class="n-stars">`;
        for (let s = 0; s < 3; s++) {
          html += `<span class="star${s < stars ? ' filled' : ''}">★</span>`;
        }
        html += `</span>`;
      }
    }

    // Boss badge
    if (isBoss) html += `<span class="n-badge">👹</span>`;
    // Lock overlay badge (doesn't replace number)
    if (isLocked) html += `<span class="n-lock">🔒</span>`;

    node.innerHTML = html;

    if (!isLocked) {
      node.addEventListener('click', () => {
        audio.init(); audio.resume(); audio.play('click');
        startLevel(n);
      });
    }

    container.appendChild(node);
  }
}

function showStartScreen() {
  state.screen = 'start';
  hideGameplayUI();
  document.getElementById('modeScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('journeyScreen').classList.add('hidden');
}
function showModeScreen() {
  state.screen = 'mode';
  hideGameplayUI();
  document.getElementById('modeScreen').classList.remove('hidden');
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('journeyScreen').classList.add('hidden');
}

// ============== INIT ==============
const LEVEL_COLORS = {
  K2: { bg: '#FFD66B', border: '#C99400', text: '#3D2E3F' },
  P1: { bg: '#FFB8A0', border: '#D14D6A', text: '#3D2E3F' },
  P2: { bg: '#C7B8EA', border: '#6B4FA0', text: '#3D2E3F' },
  P3: { bg: '#A8E6CF', border: '#2B9B63', text: '#3D2E3F' },
  beginner: { bg: '#A8E6CF', border: '#2B9B63', text: '#3D2E3F' },
  intermediate: { bg: '#A0D8F0', border: '#1976D2', text: '#3D2E3F' },
  advanced: { bg: '#C7B8EA', border: '#6B4FA0', text: '#3D2E3F' },
  native: { bg: '#FF8FB8', border: '#C14777', text: '#FFFFFF' },
};
const SUBJECT_COLORS = {
  math:    { bg: '#A8E6CF', border: '#2B9B63', text: '#3D2E3F' },
  english: { bg: '#A0D8F0', border: '#4A8BB8', text: '#3D2E3F' },
  chinese: { bg: '#FF8FB8', border: '#C14777', text: '#FFFFFF' },
  mixed:   { bg: '#FFD66B', border: '#C99400', text: '#3D2E3F' },
  korean:  { bg: '#A0D8F0', border: '#1565C0', text: '#3D2E3F' },
};

function applySelectedStyle(card, colors) {
  if (!colors) return;
  card.style.backgroundColor = colors.bg;
  card.style.borderColor = colors.border;
  card.style.color = colors.text;
  card.style.transform = 'translateY(-3px)';
  card.style.boxShadow = '0 8px 0 #3D2E3F';
  const badge = card.querySelector('.check-badge');
  if (badge) badge.style.display = 'flex';
}
function clearSelectedStyle(card) {
  card.style.backgroundColor = '';
  card.style.borderColor = '';
  card.style.color = '';
  card.style.transform = '';
  card.style.boxShadow = '';
  const badge = card.querySelector('.check-badge');
  if (badge) badge.style.display = 'none';
}

// ---- Gameplay tuning per mode ----
function getModeTuning() {
  if (state.mode === 'adults') {
    return { lives: 3, startCoinsMul: 0.8, enemySpeedMul: 1.2, questionsExtra: 2, studySkippable: true, wrongDelay: 1500 };
  }
  return { lives: null, startCoinsMul: 1.0, enemySpeedMul: 1.0, questionsExtra: 0, studySkippable: false, wrongDelay: 2000 };
}

// ---- Build start screen dynamically based on mode ----

      <div class="label">Your level</div>
      <div class="level-grid" id="levelGrid" style="grid-template-columns:1fr 1fr 1fr 1fr;">
        <div class="level-card" data-level="K2"><div class="check-badge">✓</div><div class="code">K2</div><div class="age">Age 5-6</div></div>

      </div>

      <div class="subject-grid" id="subjectGrid">
        <div class="subject-card" data-subject="math"><div class="check-badge">✓</div><span class="emoji">➕</span><div class="name">Math</div><div class="sub">Numbers</div></div>
        <div class="subject-card" data-subject="english"><div class="check-badge">✓</div><span class="emoji">📚</span><div class="name">English</div><div class="sub">Spelling · Grammar</div></div>
        <div class="subject-card" data-subject="chinese"><div class="check-badge">✓</div><span class="emoji">🀄</span><div class="name">华文</div><div class="sub">汉字 · Pinyin</div></div>
        <div class="subject-card selected" data-subject="mixed"><div class="check-badge">✓</div><span class="emoji">🌈</span><div class="name">Mixed</div><div class="sub">All three!</div></div>
      </div>
      <button class="start-btn" id="startBtn">START P1 · Mixed ✨</button>
      <button class="secondary-btn" id="backToModeBtn" style="margin-top:10px;">← Change mode</button>

  } else {
    state.level = 'beginner'; state.subject = 'korean';
    screen.innerHTML = `
      <div class="mascots"><span>🐰</span><span>🐻</span><span>🚓</span><span>🚗</span><span>👸</span><span>🐼</span><span>🦄</span><span>🦉</span></div>
      <div class="title">Adults Mode</div>
      <div class="subtitle">Language learning through tower defense!<br><span style="font-size:11px;opacity:0.85;">Beginner to native speaker · 500 levels per tier</span></div>
      <div class="label">Proficiency tier</div>
      <div class="level-grid" id="levelGrid" style="grid-template-columns:1fr 1fr;">
        <div class="level-card selected" data-level="beginner"><div class="check-badge">✓</div><div class="code">초급</div><div class="age">Beginner · TOPIK I</div></div>
        <div class="level-card coming-soon" data-level="intermediate"><div class="check-badge">✓</div><div class="code">중급</div><div class="age">Intermediate · TOPIK II</div></div>
        <div class="level-card coming-soon" data-level="advanced"><div class="check-badge">✓</div><div class="code">고급</div><div class="age">Advanced · TOPIK II</div></div>

  }
  // Wire up selection handlers
  wireStartScreenHandlers();

function wireStartScreenHandlers() {
  // Apply initial selected styles
  document.querySelectorAll('#levelGrid .level-card.selected').forEach(card => {
    applySelectedStyle(card, LEVEL_COLORS[card.dataset.level]);
  });
  document.querySelectorAll('#subjectGrid .subject-card.selected').forEach(card => {
    applySelectedStyle(card, SUBJECT_COLORS[card.dataset.subject]);
  });
  updateStartButton();

  // Level grid
  document.getElementById('levelGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.level-card');
    if (!card || card.classList.contains('selected') || card.classList.contains('coming-soon')) return;
    document.querySelectorAll('#levelGrid .level-card').forEach(c => { c.classList.remove('selected'); clearSelectedStyle(c); });
    card.classList.add('selected');
    applySelectedStyle(card, LEVEL_COLORS[card.dataset.level]);
    state.level = card.dataset.level;
    audio.init(); audio.resume(); audio.play('select');
    updateStartButton();
  });
  // Subject grid
  document.getElementById('subjectGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.subject-card');
    if (!card || card.classList.contains('selected') || card.classList.contains('coming-soon')) return;
    document.querySelectorAll('#subjectGrid .subject-card').forEach(c => { c.classList.remove('selected'); clearSelectedStyle(c); });
    card.classList.add('selected');
    applySelectedStyle(card, SUBJECT_COLORS[card.dataset.subject]);
    state.subject = card.dataset.subject;
    audio.init(); audio.resume(); audio.play('select');
    updateStartButton();
  });
  // Start button
  document.getElementById('startBtn').addEventListener('click', async () => {
    audio.init(); audio.resume(); audio.play('click');
    await showJourneyScreen();
  });
  // Back to mode
  document.getElementById('backToModeBtn').addEventListener('click', () => {
    audio.play('click'); showModeScreen();
  });
}

function updateStartButton() {
  const btn = document.getElementById('startBtn');
  if (!btn) return;
  const lvlLabel = state.mode === 'adults'
    ? {beginner:'초급 (TOPIK I)',intermediate:'중급 (TOPIK II)',advanced:'고급 (TOPIK II)',native:'원어민'}[state.level] || state.level
    : state.level;
  const subj = getSubjectLabel(state.subject);
  btn.innerHTML = `START ${lvlLabel} · ${subj} ✨`;
  btn.dataset.subject = state.subject;
  const c = SUBJECT_COLORS[state.subject];
  if (c) { btn.style.backgroundColor = c.bg; btn.style.color = c.text; }
}

// ---- Mode selection ----
document.getElementById('modeGrid').addEventListener('click', (e) => {
  const card = e.target.closest('.mode-card');
  if (!card) return;
  audio.init(); audio.resume(); audio.play('click');
  buildStartScreen(card.dataset.mode);
});

// ---- Persistent UI handlers ----
document.getElementById('journeyBackBtn').addEventListener('click', () => {
  audio.play('click'); showStartScreen();
});
document.getElementById('backBtn').addEventListener('click', async () => {
  audio.play('click');
  audio.stopMusic();
  state.running = false;
  state.phase = 'menu';
  document.getElementById('levelStartModal').style.display = 'none';
  document.getElementById('levelStartModal').innerHTML = '';
  document.getElementById('towerPopup').style.display = 'none';
  document.getElementById('towerPopup').innerHTML = '';
  document.getElementById('quizOverlay').style.display = 'none';
  document.getElementById('quizOverlay').innerHTML = '';
  await showJourneyScreen();
});
document.getElementById('sendWaveBtn').addEventListener('click', () => {
  if (state.phase === 'prep') { audio.play('click'); startWave(); }
});
const musicBtn = document.getElementById('musicBtn');
const sfxBtn = document.getElementById('sfxBtn');
musicBtn.addEventListener('click', () => {
  audio.init(); audio.resume();
  const on = audio.toggleMusic();
  musicBtn.classList.toggle('off', !on);
});
sfxBtn.addEventListener('click', () => {
  audio.init(); audio.resume();
  const on = audio.toggleSfx();
  sfxBtn.classList.toggle('off', !on);
  sfxBtn.textContent = on ? '🔊' : '🔇';
  if (on) audio.play('click');
});

resize();
progress.load();
</script>
